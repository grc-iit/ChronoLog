              echo 'Trying which mpiexec...'
              MPIEXEC_BIN=\$(which mpiexec 2>/dev/null | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' || echo '')
              if [ -n \"\${MPIEXEC_BIN}\" ] && [ -f \"\${MPIEXEC_BIN}\" ] && [ -x \"\${MPIEXEC_BIN}\" ]; then
                echo '✅ Found mpiexec via which'
              else
                MPIEXEC_BIN=''
              fi
            fi
            
            # Final fallback: try all find results and use the first executable found
            if [ -z \"\${MPIEXEC_BIN}\" ]; then
              echo 'Performing final aggressive search for mpiexec...'
              # Search in multiple locations including chronolog-repo
              ALL_MPIEXEC=\$(find /home/grc-iit/chronolog-repo /opt /usr /usr/local -name mpiexec -type f 2>/dev/null | head -20 || echo '')
              if [ -n \"\${ALL_MPIEXEC}\" ]; then
                echo 'Found mpiexec candidates:'
                echo \"\${ALL_MPIEXEC}\"
                # Try each candidate until we find one that works
                while IFS= read -r candidate; do
                  candidate=\$(echo \"\${candidate}\" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
                  if [ -n \"\${candidate}\" ]; then
                    echo \"  Testing candidate: \${candidate}\"
                    if [ -f \"\${candidate}\" ] && [ -x \"\${candidate}\" ]; then
                      MPIEXEC_BIN=\"\${candidate}\"
                      echo \"✅ Found working mpiexec: \${MPIEXEC_BIN}\"
                      break
                    else
                      echo \"    ⚠️ Not accessible (exists: \$([ -f \"\${candidate}\" ] && echo 'yes' || echo 'no'), executable: \$([ -x \"\${candidate}\" ] && echo 'yes' || echo 'no'))\"
                    fi
                  fi
                done <<< \"\${ALL_MPIEXEC}\"
              else
                echo '  No mpiexec candidates found in /opt, /usr, or /usr/local'
              fi
            fi
            
            if [ -z \"\${MPIEXEC_BIN}\" ] || [ ! -f \"\${MPIEXEC_BIN}\" ] || [ ! -x \"\${MPIEXEC_BIN}\" ]; then
              echo '❌ mpiexec not found after exhaustive search'
              echo ''
              echo '=== Diagnostic Information ==='
              echo 'Checking Spack environment view (expected location):'
              echo \"  /home/grc-iit/chronolog-repo/.spack-env/view/bin/mpiexec: \$([ -f \"/home/grc-iit/chronolog-repo/.spack-env/view/bin/mpiexec\" ] && echo 'exists' || echo 'not found')\"
              if [ -d \"/home/grc-iit/chronolog-repo/.spack-env/view/bin\" ]; then
                echo \"  Contents of .spack-env/view/bin:\"
                ls -la \"/home/grc-iit/chronolog-repo/.spack-env/view/bin\" | head -10 || true
              fi
              echo ''
              echo 'Checking common locations:'
              for loc in /usr/bin/mpiexec /usr/local/bin/mpiexec /opt/view/bin/mpiexec; do
                echo \"  \${loc}: \$([ -f \"\${loc}\" ] && echo 'exists' || echo 'not found')\"
              done
              echo ''
              echo 'Checking for mpich in /opt/software:'
              if [ -d /opt/software ]; then
                find /opt/software -type d -name '*mpich*' 2>/dev/null | head -5 || echo 'No mpich directories found'
              else
                echo '  /opt/software does not exist'
              fi
              echo ''
              echo 'Checking for mpich via Spack:'
              spack find -p mpich 2>&1 || echo 'spack find -p mpich failed'
              echo ''
              echo 'Checking for openmpi via Spack:'
              spack find -p openmpi 2>&1 || echo 'spack find -p openmpi failed'
              echo ''
              echo 'Searching for mpiexec in system:'
              find /home/grc-iit/chronolog-repo /opt /usr /usr/local -name mpiexec -type f 2>/dev/null | head -20 || echo 'No mpiexec found'
              echo ''
              echo 'Current PATH:'
              echo \$PATH
              echo ''
              echo 'Checking if mpiexec is in PATH:'
              which -a mpiexec 2>&1 || echo 'mpiexec not in PATH'
              echo ''
              echo 'Listing /opt/software (if exists):'
              ls -la /opt/software 2>/dev/null | head -20 || echo 'Cannot list /opt/software'
              echo ''
              echo 'Listing /opt/view (if exists):'
              ls -la /opt/view 2>/dev/null | head -20 || echo 'Cannot list /opt/view'
              echo ''
              echo 'Listing /opt/spack directories (if exists):'
              ls -la /home/grc-iit/spack/opt/spack/ 2>/dev/null | head -20 || echo 'Cannot list /opt/spack'
              exit 1
            fi
            echo \"✅ Using mpiexec at: \${MPIEXEC_BIN}\"
            echo \"   Verifying mpiexec works: \${MPIEXEC_BIN} --version\"
            \${MPIEXEC_BIN} --version 2>&1 || echo '⚠️ mpiexec --version failed, but continuing...'
            
            # Verify required files and binaries
            # Use the same path structure as .github/scripts/dynamic_deploy.sh: ~/chronolog-install/chronolog
            # WORK_DIR is already set to /home/grc-iit/chronolog-install/chronolog
            CLIENT_ADMIN_BIN=\${WORK_DIR}/bin/client_admin
            HOSTS_FILE=\${WORK_DIR}/conf/hosts_client
            # Use default_client_conf.json as shown in user's example
            CONF_FILE=\${WORK_DIR}/conf/default_client_conf.json
            
            echo '🔍 Verifying installation paths...'
            echo \"  WORK_DIR: \${WORK_DIR}\"
            echo \"  Current directory: \$(pwd)\"
            echo \"  HOME: \${HOME}\"
            echo \"  Checking if WORK_DIR exists: \$([ -d \${WORK_DIR} ] && echo 'yes' || echo 'no')\"
            if [ -d \${WORK_DIR} ]; then
              echo \"  Contents of WORK_DIR:\"
              ls -la \${WORK_DIR} | head -10
            fi
            echo ''
            
            echo '🔍 Verifying required files...'
            if [ ! -f \"\${CLIENT_ADMIN_BIN}\" ]; then
              echo '❌ client_admin binary not found at' \"\${CLIENT_ADMIN_BIN}\"
              echo 'Contents of bin directory:'
              ls -la \${WORK_DIR}/bin/ 2>/dev/null || echo 'bin directory not found'
              exit 1
            fi
            echo \"✅ client_admin found\"
            
            if [ ! -f \"\${HOSTS_FILE}\" ]; then
              echo '❌ hosts_client file not found at' \"\${HOSTS_FILE}\"
              echo 'Contents of conf directory:'
              ls -la \${WORK_DIR}/conf/ 2>/dev/null || echo 'conf directory not found'
              exit 1
            fi
            echo \"✅ hosts_client found\"
            
            if [ ! -f \"\${CONF_FILE}\" ]; then
              echo '❌ Client config file not found at' \"\${CONF_FILE}\"
              echo 'Available config files:'
              ls -la \${WORK_DIR}/conf/*.json 2>/dev/null || echo 'No config files found'
              exit 1
            fi
            echo \"✅ Client config found\"
            
            echo ''
            echo '📋 Test configuration:'
            echo \"  MPIEXEC: \${MPIEXEC_BIN}\"
            echo \"  CLIENT_ADMIN: \${CLIENT_ADMIN_BIN}\"
            echo \"  HOSTS_FILE: \${HOSTS_FILE}\"
            echo \"  CONF_FILE: \${CONF_FILE}\"
            echo ''
            echo '📋 Contents of hosts_client:'
            cat \"\${HOSTS_FILE}\"
            echo ''
            
            # Verify ChronoLog services are still running
            echo '🔍 Checking ChronoLog services status...'
            RUNNING_PROCS=\$(pgrep -la chrono || true)
            if [ -z \"\$RUNNING_PROCS\" ]; then
              echo '❌ No ChronoLog processes found! Services may have crashed.'
              echo 'Checking monitor logs...'
              if [ -d \"\${WORK_DIR}/monitor\" ]; then
                for log in \"\${WORK_DIR}/monitor/\"*; do
                  if [ -f \"\$log\" ]; then
                    echo \"==== Last 20 lines of \$log ====\"
                    tail -20 \"\$log\" 2>/dev/null || true
                    echo ''
                  fi
                done
              fi
              exit 1
            fi
            echo 'ChronoLog processes running:'
            echo \"\$RUNNING_PROCS\"
            echo ''
            
            # Test SSH connectivity before running MPI
            echo '🔌 Testing SSH connectivity to all client hosts...'
            SSH_FAILED=0
            while IFS= read -r host; do
              if [ -n \"\$host\" ]; then
                if timeout 5 ssh -o StrictHostKeyChecking=no -o BatchMode=yes -o ConnectTimeout=5 \"\$host\" 'echo SSH OK' > /dev/null 2>&1; then
                  echo \"  ✅ SSH to \$host successful\"
                else
                  echo \"  ❌ SSH to \$host failed\"
                  SSH_FAILED=1
                fi
              fi
            done < \"\${HOSTS_FILE}\"
            
            if [ \"\$SSH_FAILED\" -eq 1 ]; then
              echo '❌ SSH connectivity test failed for one or more hosts'
              echo 'Checking SSH service status...'
              service ssh status || true
              exit 1
            fi
            echo '✅ All SSH connectivity tests passed'
            echo ''
            
            # Display client configuration for debugging
            echo '📋 Client configuration file contents:'
            cat \"\${CONF_FILE}\" || echo '⚠️ Could not read config file'
            echo ''
            
            # Run the client performance test
            # Use the exact command structure from the user's example
            # The user's example: mpiexec -n 4 -f hosts_client client_admin --config default_client_conf.json -a 4096 -b 4096 -s 4096 -n 4096 -t 1 -h 1 -p -r
            # Note: The user's example uses relative paths from ~, but we use absolute paths which should work the same
            echo '🚀 Running client performance test...'
            echo 'Command:'
            echo \"  \${MPIEXEC_BIN} -n 4 -f \${HOSTS_FILE} \${CLIENT_ADMIN_BIN} --config \${CONF_FILE} -a 4096 -b 4096 -s 4096 -n 4096 -t 1 -h 1 -p -r\"
            echo ''
            echo 'Path verification:'
            echo \"  MPIEXEC_BIN: \${MPIEXEC_BIN} (\$([ -f \${MPIEXEC_BIN} ] && echo 'exists' || echo 'NOT FOUND'))\"
            echo \"  CLIENT_ADMIN_BIN: \${CLIENT_ADMIN_BIN} (\$([ -f \${CLIENT_ADMIN_BIN} ] && echo 'exists' || echo 'NOT FOUND'))\"
            echo \"  HOSTS_FILE: \${HOSTS_FILE} (\$([ -f \${HOSTS_FILE} ] && echo 'exists' || echo 'NOT FOUND'))\"
            echo \"  CONF_FILE: \${CONF_FILE} (\$([ -f \${CONF_FILE} ] && echo 'exists' || echo 'NOT FOUND'))\"
            echo ''
            
            # Set LD_LIBRARY_PATH as shown in user's example
            export LD_LIBRARY_PATH=\${WORK_DIR}/lib:\$LD_LIBRARY_PATH
            echo \"  LD_LIBRARY_PATH: \${LD_LIBRARY_PATH}\"
            echo ''
            
            # Change to the work directory to match user's example (which runs from the install directory)
            cd \${WORK_DIR}
            echo \"  Changed to directory: \$(pwd)\"
            echo ''
            
            # Run the test (write and read in one command with -r flag)
            # Use relative paths from WORK_DIR to match user's example more closely
            # Add timeout to prevent hanging (5 minutes should be enough for the test)
            # Add verbose MPI output to debug connection issues
            echo 'Starting test with 5 minute timeout and verbose MPI output...'
            echo 'Note: The test will write data first (-p) then read it back (-r)'
            echo 'This may take some time depending on the data size...'
            
            # Run with verbose output to see what MPI is doing
            if timeout 300 \${MPIEXEC_BIN} -l -n 4 -f conf/hosts_client \
              bin/client_admin \
              --config conf/default_client_conf.json \
              -a 4096 -b 4096 -s 4096 -n 4096 -t 1 -h 1 -p -r 2>&1 | tee /tmp/mpi_test_output.log; then
              echo ''
              echo '✅ Client performance test completed successfully'
              echo '📊 Final system resources:'
              free -h || true
            else
              TEST_EXIT_CODE=\$?
              echo ''
              if [ \$TEST_EXIT_CODE -eq 124 ]; then
                echo '❌ Client performance test timed out after 5 minutes'
                echo 'This might indicate:'
                echo '  - ChronoLog services are not responding'
                echo '  - Network connectivity issues between containers'
                echo '  - MPI processes are stuck waiting'
              else
                echo \"❌ Client performance test failed with exit code \${TEST_EXIT_CODE}\"
              fi
              echo ''
              echo '🔍 Checking if ChronoLog services are still running...'
              pgrep -la chrono || echo 'No ChronoLog processes found'
              echo ''
              echo '🔍 Checking MPI processes...'
              pgrep -la mpiexec || echo 'No mpiexec processes found'
              pgrep -la client_admin || echo 'No client_admin processes found'
              echo ''
              echo '📋 MPI test output (if available):'
              if [ -f /tmp/mpi_test_output.log ]; then
                tail -50 /tmp/mpi_test_output.log || true
              fi
              echo ''
              echo '📊 System resources after test failure:'
              free -h || true
              echo ''
              echo '📋 Checking ChronoLog monitor logs for errors...'
              if [ -d \"\${WORK_DIR}/monitor\" ]; then
                for log in \"\${WORK_DIR}/monitor/\"*; do
                  if [ -f \"\$log\" ]; then
                    echo \"==== Last 20 lines of \$log ====\"
                    tail -20 \"\$log\" 2>/dev/null || true
                    echo ''
                  fi
                done
              fi
              exit \${TEST_EXIT_CODE}
            fi
          "

      - name: Stop ChronoLog
        if: always()
        run: |
          # Do not fail if stop command has errors - this is cleanup
          docker exec --user grc-iit chronolog-c1 bash -c "
            # Do not use set -e here - we want cleanup to continue even if some commands fail
            WORK_DIR=\"/home/grc-iit/chronolog-install/chronolog\"
            cd /home/grc-iit/chronolog-repo 2>/dev/null || true
            source /home/grc-iit/spack/share/spack/setup-env.sh 2>/dev/null || true
            # Check if .spack-env exists and handle permission issues
            if [ -d .spack-env ]; then
              if [ -L .spack-env ]; then
                TARGET=\$(readlink .spack-env 2>/dev/null)
                if [[ \"\$TARGET\" == /workspace* ]]; then
                  echo '⚠️ .spack-env is a symlink to /workspace, removing and recreating...'
                  rm -f .spack-env 2>/dev/null || true
                fi
              fi
              if [ ! -w .spack-env ]; then
                sudo chmod -R u+w .spack-env 2>/dev/null || true
              fi
            fi
            spack env activate -d . 2>/dev/null || spack env activate -p . 2>/dev/null || true
            
            echo 'Stopping ChronoLog...'
            echo '📊 System resources before stopping:'
            free -h 2>/dev/null || true
            
            # List running processes before stop (check across all containers)
            echo 'ChronoLog processes before stop:'
            for i in \$(seq 1 7); do
              echo \"Processes on c\$i:\"
              docker exec chronolog-c\$i pgrep -la chrono 2>/dev/null || echo 'No ChronoLog processes running'
            done
            
            # Use the deploy script to stop gracefully (it handles distributed processes)
            if [ -x ./tools/deploy/ChronoLog/single_user_deploy.sh ]; then
              echo 'Using deploy script for graceful stop...'
              ./tools/deploy/ChronoLog/single_user_deploy.sh -s -w \"\${WORK_DIR}\" 2>/dev/null || {
                echo '⚠️ Graceful stop via deploy script failed, attempting manual cleanup...'
              }
              sleep 3
            else
              echo '⚠️ Deploy script not found, performing manual cleanup...'
            fi
            
            # Final verification (check across all containers)
            echo 'Final process check:'
            for i in \$(seq 1 7); do
              echo \"Processes on c\$i:\"
              docker exec chronolog-c\$i pgrep -la chrono 2>/dev/null || echo 'No ChronoLog processes running'
            done
          " || echo "⚠️ Stop command had errors but continuing cleanup"

      - name: Clean up containers
        if: always()
        run: |
          docker compose -f dynamic-compose.yaml down -v
          echo "✅ Containers cleaned up"

