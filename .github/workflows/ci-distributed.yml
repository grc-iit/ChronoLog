      - name: Deploy ChronoLog
        run: |
          set -e
          docker exec --user grc-iit chronolog-c1 bash -c "
            # Do not use set -e in cleanup section to avoid container termination
            WORK_DIR=\"/home/grc-iit/chronolog-install/chronolog\"
            cd /home/grc-iit/chronolog-repo
            source /home/grc-iit/spack/share/spack/setup-env.sh
            # Check if .spack-env exists and handle permission issues
            if [ -d .spack-env ]; then
              if [ -L .spack-env ]; then
                TARGET=\$(readlink .spack-env)
                if [[ \"\$TARGET\" == /workspace* ]]; then
                  echo '⚠️ .spack-env is a symlink to /workspace, removing and recreating...'
                  rm -f .spack-env
                fi
              fi
              if [ ! -w .spack-env ]; then
                sudo chmod -R u+w .spack-env 2>/dev/null || true
              fi
            fi
            spack env activate -d . 2>/dev/null || spack env activate -p . 2>/dev/null || true
            echo '[3/5] Deploying ChronoLog...'
            
            # Check system resources before deployment
            echo '📊 System resources before deployment:'
            echo 'Memory:'
            free -h || true
            echo 'Disk:'
            df -h /home/grc-iit || true
            
            # Clean up any existing ChronoLog processes before deployment
            # First check if any processes are running
            echo '🔍 Checking for existing ChronoLog processes...'
            EXISTING_PROCS=\$(pgrep -la 'chrono_player|chrono_keeper|chrono_grapher|chronovisor_server|client_admin' 2>/dev/null || true)
            if [ -n \"\$EXISTING_PROCS\" ]; then
              echo '⚠️ Found existing ChronoLog processes:'
              echo \"\$EXISTING_PROCS\"
              echo '🧹 Attempting graceful cleanup using deploy script...'
              
              # Try to use the deploy script's stop function for graceful shutdown
              if [ -x ./tools/deploy/ChronoLog/single_user_deploy.sh ]; then
                echo 'Using deploy script to stop services gracefully...'
                ./tools/deploy/ChronoLog/single_user_deploy.sh -s -w \"\${WORK_DIR}\" 2>/dev/null || {
                  echo '⚠️ Graceful stop via deploy script failed, will continue anyway'
                }
                sleep 3
              fi
              
              # Check if processes are still running after graceful stop
              REMAINING=\$(pgrep -la 'chrono_player|chrono_keeper|chrono_grapher|chronovisor_server|client_admin' 2>/dev/null || true)
              if [ -n \"\$REMAINING\" ]; then
                echo '⚠️ Some processes still running after graceful stop:'
                echo \"\$REMAINING\"
                echo 'Attempting individual process cleanup (SIGTERM first, then SIGKILL)...'
                
                # Try graceful kill (SIGTERM) first for each process type
                for proc in chrono_player chrono_keeper chrono_grapher chronovisor_server client_admin; do
                  if pgrep -f \"\$proc\" > /dev/null 2>&1; then
                    echo \"  Sending SIGTERM to \$proc...\"
                    pkill -f \"\$proc\" 2>/dev/null || true
                  fi
                done
                sleep 2
                
                # Check again and only use SIGKILL if necessary
                STILL_RUNNING=\$(pgrep -la 'chrono_player|chrono_keeper|chrono_grapher|chronovisor_server|client_admin' 2>/dev/null || true)
                if [ -n \"\$STILL_RUNNING\" ]; then
                  echo '⚠️ Some processes did not stop with SIGTERM, using SIGKILL...'
                  for proc in chrono_player chrono_keeper chrono_grapher chronovisor_server client_admin; do
                    if pgrep -f \"\$proc\" > /dev/null 2>&1; then
                      echo \"  Sending SIGKILL to \$proc...\"
                      pkill -9 -f \"\$proc\" 2>/dev/null || true
                    fi
                  done
                  sleep 1
                fi
              fi
              
              # Final verification
              FINAL_CHECK=\$(pgrep -la 'chrono_player|chrono_keeper|chrono_grapher|chronovisor_server|client_admin' 2>/dev/null || true)
              if [ -n \"\$FINAL_CHECK\" ]; then
                echo '⚠️ Warning: Some processes may still be running after cleanup:'
                echo \"\$FINAL_CHECK\"
                echo 'Proceeding with deployment anyway...'
              else
                echo '✅ All ChronoLog processes cleaned up'
              fi
            else
              echo '✅ No existing ChronoLog processes found'
            fi
            
            # Now enable strict error handling for deployment
            set -e
            
            # Deploy ChronoLog using single_user_deploy.sh (distributed deployment)
            if [ -x ./tools/deploy/ChronoLog/single_user_deploy.sh ]; then
              echo '🚀 Starting ChronoLog deployment...'
              # single_user_deploy.sh uses hosts files to determine distribution
              # NUM_RECORDING_GROUP is auto-detected from hosts_grapher file
              ./tools/deploy/ChronoLog/single_user_deploy.sh -d -w \"\${WORK_DIR}\"
            else
              echo '❌ Deploy script not found or not executable'
              ls -la ./tools/deploy/ChronoLog/ || true
              exit 1
            fi
            
            echo '✅ ChronoLog deployment started'
            echo '📊 System resources after deployment:'
            echo 'Memory:'
            free -h || true
          "

      - name: Verify Deployment
        run: |
          set -e
          WORK_DIR="/home/grc-iit/chronolog-install/chronolog"
          
            echo '[4/5] Verifying deployment...'
          
          # Check system resources on c1
          echo '📊 System resources during verification:'
          docker exec chronolog-c1 bash -c "free -h || true" || true
          
            echo 'Waiting for services to start...'
          # Give services more time to fully start
          sleep 15
          
          echo '📦 Listing ChronoLog processes across all containers...'
          # For distributed deployment, we need to check processes across all containers
          # single_user_deploy.sh distributes processes, so we check on each container
          # Run docker exec from the host (not from inside a container)
          PROCESS_LIST="/tmp/chrono_processes.txt"
          rm -f "${PROCESS_LIST}"
          
          # Check processes on each container (from host)
          for i in $(seq 1 7); do
            echo "Checking processes on c$i..."
            docker exec chronolog-c$i pgrep -la chrono >> "${PROCESS_LIST}" 2>/dev/null || true
          done
          
          echo "Collected process list:"
          cat "${PROCESS_LIST}" || echo "No processes found"
          
            echo '🔍 Checking required components...'
            missing=0
          # Based on hosts files prepared:
          # - 1 chronovisor_server on c1
          # - 2 chrono_grapher (one per recording group, on c4, c5)
          # - 2 chrono_player (one per recording group, on c6, c7)
          # - 2 chrono_keeper (on c2, c3)
          declare -A expected_counts
          expected_counts[chronovisor_server]=1
          expected_counts[chrono_grapher]=2
          expected_counts[chrono_player]=2
          expected_counts[chrono_keeper]=2
          
          for proc in "${!expected_counts[@]}"; do
            count=$(grep -c "$proc" "${PROCESS_LIST}" || echo "0")
            expected=${expected_counts[$proc]}
            if [ "$count" -eq "$expected" ]; then
              echo "✅ Found $count $proc (expected $expected)"
            else
              echo "❌ Missing or wrong count: $proc (found $count, expected $expected)"
                missing=1
              fi
            done
          
          if [ "$missing" != "0" ]; then
              echo '❌ Deployment verification failed'
            echo ''
            echo '==== System Resource Status (c1) ===='
            docker exec chronolog-c1 bash -c "free -h || true" || true
            echo ''
            docker exec chronolog-c1 bash -c "df -h /home/grc-iit || true" || true
            echo ''
            echo '==== All Running Processes (chrono*) on each container ===='
            for i in $(seq 1 7); do
              echo "--- Processes on c$i ---"
              docker exec chronolog-c$i bash -c "ps aux | grep chrono | grep -v grep || echo 'No chrono processes found'" || true
            done
            echo ''
              echo '==== Dumping monitor logs ===='
            docker exec chronolog-c1 bash -c "
              if [ -d \"${WORK_DIR}/monitor\" ]; then
                for log in \"${WORK_DIR}/monitor/\"*; do
                  if [ -f \"\$log\" ]; then
                  echo \"==== \$log ====\"
                    tail -100 \"\$log\" 2>/dev/null || echo \"Could not read \$log\"
                    echo ''
                  fi
                done
              else
                echo '⚠️ Monitor directory not found'
                echo 'Searching for monitor directory...'
                find /home/grc-iit -type d -name monitor 2>/dev/null | head -5
              fi
            " || true
            rm -f "${PROCESS_LIST}" || true
              exit 1
            fi
          
          # Clean up process list file
          rm -f "${PROCESS_LIST}"
            echo '✅ Deployment verification passed'

