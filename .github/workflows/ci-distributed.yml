                fi
              fi
              # Try to make it writable
              if [ ! -w .spack-env ]; then
                echo '⚠️ .spack-env is not writable, attempting to fix permissions...'
                sudo chmod -R u+w .spack-env 2>/dev/null || {
                  echo '⚠️ Could not make .spack-env writable, will try to work around...'
                }
              fi
            fi
            # Activate Spack environment (use -d flag to avoid writing to .spack-env if read-only)
            spack env activate -d . 2>/dev/null || spack env activate -p . 2>/dev/null || {
              echo '⚠️ Could not activate Spack environment, continuing anyway...'
            }
            echo '[2/5] Verifying installation...'
            echo 'Checking installation directory structure...'
            echo \"WORK_DIR: \${WORK_DIR}\"
            if [ -d \"\${WORK_DIR}\" ]; then
              echo '✅ Installation directory exists'
              echo 'Contents:'
              ls -la \"\${WORK_DIR}\"
            else
              echo '❌ Installation directory not found'
              echo 'Searching for chronolog-install directories...'
              find /home/grc-iit -type d -name 'chronolog-install' 2>/dev/null | head -10
              exit 1
            fi
            if [ -d \"\${WORK_DIR}/bin\" ]; then
              echo '✅ bin directory found'
              echo 'Contents of bin directory:'
              ls -la \"\${WORK_DIR}/bin\"
            else
