name: ChronoLog CI - Distributed Environment

on:
  workflow_run:
    workflows: ["ChronoLog CI"]
    types:
      - completed
  pull_request:
    branches: [develop, main]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/chronolog-ci
  INSTALL_BASE: /home/grc-iit/chronolog-install

jobs:
  distributed-test:
    # Run on workflow_dispatch, successful workflow_run, or pull_request
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || (github.event_name == 'pull_request' && github.event.pull_request.head.sha) || github.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine image name from main CI workflow
        id: set-image-name
        run: |
          # Convert repository name to lowercase (Docker requirement)
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          
          # Use branch name for Docker image tag (matching ci.yml logic)
          # For workflow_run, get the branch from the triggering workflow
          # For pull_request, use the head branch (PR branch)
          # For workflow_dispatch, use the current branch
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            # For workflow_run, get the branch from the triggering workflow
            # For PRs, head_branch contains the PR branch name (matching ci.yml's github.head_ref)
            # For pushes, head_branch contains the branch name
            BRANCH_NAME="${{ github.event.workflow_run.head_branch }}"
            if [ -z "$BRANCH_NAME" ] || [ "$BRANCH_NAME" = "null" ]; then
              # Fallback: try to extract from head_sha or use ref_name
              BRANCH_NAME="${{ github.event.workflow_run.head_branch || github.ref_name }}"
            fi
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            # For pull_request, use the head branch (PR branch name)
            BRANCH_NAME="${{ github.head_ref }}"
          else
            # For workflow_dispatch, use the current branch
            BRANCH_NAME="${{ github.ref_name }}"
          fi
          
          # Sanitize branch name for Docker tag (replace / with -, remove invalid characters)
          BRANCH_TAG=$(echo "$BRANCH_NAME" | sed 's/\//-/g' | sed 's/[^a-zA-Z0-9._-]/-/g')
          
          TAG="chronolog-${BRANCH_TAG}"
          IMAGE_NAME="ghcr.io/${REPO_LOWER}/chronolog:${TAG}"
          echo "full-name=${IMAGE_NAME}" >> $GITHUB_OUTPUT
          echo "Using image from main CI workflow: ${IMAGE_NAME} (branch: ${BRANCH_NAME})"

      - name: Pull Docker image from main CI workflow
        id: pull-image
        run: |
          set -e
          IMAGE_NAME="${{ steps.set-image-name.outputs.full-name }}"
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          
          echo "Attempting to pull final image from main CI workflow: ${IMAGE_NAME}"
          
          # For PRs, wait a bit and retry in case the image was just pushed
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            MAX_RETRIES=10
            RETRY_COUNT=0
            while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
              if docker pull "${IMAGE_NAME}" 2>/dev/null; then
                echo "✅ Successfully pulled final image from main CI workflow"
                docker tag "${IMAGE_NAME}" "ghcr.io/${REPO_LOWER}/chronolog:latest"
                echo "use-final-image=true" >> $GITHUB_OUTPUT
                exit 0
              else
                RETRY_COUNT=$((RETRY_COUNT + 1))
                if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
                  echo "⏳ Image not ready yet, waiting 30 seconds (attempt $RETRY_COUNT/$MAX_RETRIES)..."
                  sleep 30
                fi
              fi
            done
            echo "❌ Final image not found after $MAX_RETRIES attempts: ${IMAGE_NAME}"
            echo "⚠️ Please ensure the main CI workflow (ci.yml) has completed successfully"
            echo "The image should be tagged as: chronolog-{branch-name}"
            exit 1
          else
            # For workflow_run and workflow_dispatch, try once
            if docker pull "${IMAGE_NAME}" 2>/dev/null; then
              echo "✅ Successfully pulled final image from main CI workflow"
              docker tag "${IMAGE_NAME}" "ghcr.io/${REPO_LOWER}/chronolog:latest"
              echo "use-final-image=true" >> $GITHUB_OUTPUT
            else
              echo "❌ Final image not found: ${IMAGE_NAME}"
              echo "⚠️ Please ensure the main CI workflow (ci.yml) has completed successfully"
              echo "The image should be tagged as: chronolog-{branch-name}"
              exit 1
            fi
          fi

      - name: Set up distributed deployment
        run: |
          set -e
          NUM_CONTAINERS=7
          NUM_KEEPERS=2
          NUM_GRAPHERS=2
          NUM_PLAYERS=2
          
          # Use the 'latest' tag we just created (which points to the main CI workflow image)
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          BASE_IMAGE="ghcr.io/${REPO_LOWER}/chronolog:latest"
          
          # Generate the docker-compose file dynamically
          cat > dynamic-compose.yaml <<EOF
          x-common: &x-common
            image: ${BASE_IMAGE}
            init: true
            networks:
              - chronolog_net
            cap_add:
              - SYS_ADMIN
              - SYS_PTRACE
            security_opt:
              - seccomp:unconfined
              - apparmor:unconfined
            privileged: false
            # Add resource limits to prevent OOM kills
            mem_limit: 4g
            mem_reservation: 2g
            cpus: 2
            shm_size: 512m
            command: >
              bash -c "sleep infinity"

          services:
          EOF
          
          # Generate the regular container services
          for i in $(seq 1 $NUM_CONTAINERS); do
            cat >> dynamic-compose.yaml << EOF
            c$i:
              <<: *x-common
              hostname: c$i
              container_name: chronolog-c$i
              volumes:
                - shared_home:/home/grc-iit
                - ${{ github.workspace }}:/workspace
          EOF
          
            # Add dependencies starting from the second container
            if [ $i -gt 1 ]; then
              cat >> dynamic-compose.yaml <<EOF
              depends_on:
                - c1
          EOF
            fi
          done
          
          # Add networks and volumes
          cat >> dynamic-compose.yaml <<EOF

          networks:
            chronolog_net:

          volumes:
            shared_home:
          EOF
          
          echo "✅ Generated dynamic-compose.yaml"
          cat dynamic-compose.yaml

      - name: Launch docker-compose containers
        run: |
          docker compose -f dynamic-compose.yaml up -d
          echo "✅ Containers launched"
          docker ps

      - name: Wait for containers to be ready
        run: |
          echo "Waiting for containers to be ready..."
          sleep 10
          for i in $(seq 1 7); do
            echo "Checking container c$i..."
            docker exec chronolog-c$i bash -c "echo 'Container c$i is ready'" || echo "Container c$i not ready yet"
          done

      - name: Create grc-iit user and install SSH in containers
        run: |
          set -e
          NUM_CONTAINERS=7
          for i in $(seq 1 $NUM_CONTAINERS); do
            docker exec chronolog-c$i bash -c "
              # Install dependencies required for single_user_deploy.sh
              # - openssh-server, sudo: for SSH access
              # - pssh (parallel-ssh): for distributed process launching
              # - dnsutils: provides dig command for hostname resolution
              # - jq: JSON processor for config file parsing
              # - chrpath: for library path manipulation
              apt-get update && apt-get install -y openssh-server sudo pssh dnsutils jq chrpath || true
              
              # Create user if it doesn't exist
              if ! id -u grc-iit >/dev/null 2>&1; then
                useradd -m -s /bin/bash grc-iit
                echo 'grc-iit ALL=(ALL) NOPASSWD: ALL' >> /etc/sudoers
                mkdir -p /home/grc-iit
                chown -R grc-iit:grc-iit /home/grc-iit
              fi
              
              # Start SSH service
              service ssh start || /etc/init.d/ssh start || true
            "
          done
          echo "✅ User grc-iit created and SSH installed in all containers"

      - name: Prepare SSH keys and known hosts
        run: |
          set -e
          NUM_CONTAINERS=7
          
          # Prepare SSH keys and known hosts (remove -it flags for CI, run as grc-iit user)
          docker exec --user grc-iit chronolog-c1 bash -c "mkdir -p /home/grc-iit/.ssh && ssh-keygen -t rsa -b 4096 -f /home/grc-iit/.ssh/id_rsa -N '' || true"
          docker exec --user grc-iit chronolog-c1 bash -c "cat /home/grc-iit/.ssh/id_rsa.pub > /home/grc-iit/.ssh/authorized_keys"
          docker exec --user grc-iit chronolog-c1 bash -c "for i in \$(seq 1 $NUM_CONTAINERS); do ssh-keyscan -t rsa,ed25519 c\$i >> /home/grc-iit/.ssh/known_hosts 2>/dev/null; done"
          docker exec chronolog-c1 bash -c "chown -R grc-iit:grc-iit /home/grc-iit/.ssh && chmod 700 /home/grc-iit/.ssh && chmod 600 /home/grc-iit/.ssh/id_rsa && chmod 644 /home/grc-iit/.ssh/id_rsa.pub && chmod 600 /home/grc-iit/.ssh/authorized_keys"
          docker exec --user grc-iit chronolog-c1 bash -c "echo 'export USER=grc-iit' >> ~/.bashrc"
          
          # Copy SSH keys to all containers
          # First, extract files from c1 to temporary files on host
          docker cp chronolog-c1:/home/grc-iit/.ssh/id_rsa.pub /tmp/id_rsa.pub.tmp || true
          docker cp chronolog-c1:/home/grc-iit/.ssh/known_hosts /tmp/known_hosts.tmp || true
          
          for i in $(seq 1 $NUM_CONTAINERS); do
            docker exec chronolog-c$i bash -c "mkdir -p /home/grc-iit/.ssh && chown -R grc-iit:grc-iit /home/grc-iit/.ssh" || true
            # Copy id_rsa.pub to authorized_keys
            if [ -f /tmp/id_rsa.pub.tmp ]; then
              docker cp /tmp/id_rsa.pub.tmp chronolog-c$i:/home/grc-iit/.ssh/authorized_keys || true
            fi
            # Copy known_hosts
            if [ -f /tmp/known_hosts.tmp ]; then
              docker cp /tmp/known_hosts.tmp chronolog-c$i:/home/grc-iit/.ssh/known_hosts || true
            fi
            docker exec chronolog-c$i bash -c "chown -R grc-iit:grc-iit /home/grc-iit/.ssh && chmod 700 /home/grc-iit/.ssh && chmod 600 /home/grc-iit/.ssh/authorized_keys && chmod 644 /home/grc-iit/.ssh/known_hosts" || true
            docker exec --user grc-iit chronolog-c$i bash -c "echo 'export USER=grc-iit' >> ~/.bashrc" || true
          done
          
          # Clean up temporary files
          rm -f /tmp/id_rsa.pub.tmp /tmp/known_hosts.tmp || true
          
          echo "✅ SSH keys configured"

      - name: Copy workspace to containers
        run: |
          set -e
          # Copy workspace to shared location in c1 (as root, then change ownership)
          docker exec chronolog-c1 bash -c "mkdir -p /home/grc-iit/chronolog-repo && cp -r /workspace/* /home/grc-iit/chronolog-repo/ 2>/dev/null || true && chown -R grc-iit:grc-iit /home/grc-iit/chronolog-repo"
          echo "✅ Workspace copied to containers"

      - name: Prepare hosts files
        run: |
          set -e
          NUM_CONTAINERS=7
          NUM_KEEPERS=2
          NUM_GRAPHERS=2
          NUM_PLAYERS=2
          
          WORK_DIR="/home/grc-iit/chronolog-install/chronolog"
          
          # Create conf directory (as root, then change ownership)
          docker exec chronolog-c1 bash -c "mkdir -p ${WORK_DIR}/conf && chown -R grc-iit:grc-iit ${WORK_DIR}"
          
          # Prepare hosts files (run as grc-iit user)
          docker exec --user grc-iit chronolog-c1 bash -c "rm -rf ${WORK_DIR}/conf/hosts_*"
          docker exec --user grc-iit chronolog-c1 bash -c "echo c1 > ${WORK_DIR}/conf/hosts_visor"
          
          for i in $(seq 2 $(($NUM_KEEPERS + 1))); do
            docker exec --user grc-iit chronolog-c1 bash -c "echo c$i >> ${WORK_DIR}/conf/hosts_keeper"
          done
          
          for i in $(seq $(($NUM_KEEPERS + 2)) $(($NUM_KEEPERS + $NUM_GRAPHERS + 1))); do
            docker exec --user grc-iit chronolog-c1 bash -c "echo c$i >> ${WORK_DIR}/conf/hosts_grapher"
          done
          
          for i in $(seq $(($NUM_KEEPERS + $NUM_GRAPHERS + 2)) $(($NUM_KEEPERS + $NUM_GRAPHERS + $NUM_PLAYERS + 1))); do
            docker exec --user grc-iit chronolog-c1 bash -c "echo c$i >> ${WORK_DIR}/conf/hosts_player"
          done
          
          for i in $(seq 1 $NUM_CONTAINERS); do
            docker exec --user grc-iit chronolog-c1 bash -c "echo c$i >> ${WORK_DIR}/conf/hosts_clients"
          done
          
          for i in $(seq 1 $NUM_CONTAINERS); do
            docker exec --user grc-iit chronolog-c1 bash -c "echo c$i >> ${WORK_DIR}/conf/hosts_all"
          done
          
          # Generate client hosts file (use hostnames c1, c2, etc. for MPI SSH)
          # For distributed test, use first 4 containers
          docker exec --user grc-iit chronolog-c1 bash -c "echo c1 > ${WORK_DIR}/conf/hosts_client"
          for i in $(seq 2 4); do
            docker exec --user grc-iit chronolog-c1 bash -c "echo c$i >> ${WORK_DIR}/conf/hosts_client"
          done
          
          echo "✅ Hosts files prepared"
          docker exec chronolog-c1 bash -c "ls -la ${WORK_DIR}/conf/"

      - name: Setup ChronoLog (copy from image or build)
        run: |
          set -e
          USE_FINAL_IMAGE="${{ steps.pull-image.outputs.use-final-image }}"
          
          if [ "$USE_FINAL_IMAGE" == "true" ]; then
            echo '[1/5] Copying ChronoLog installation from main CI image...'
            # The main CI workflow installs to ${HOME}/chronolog-install/chronolog (which is /home/grc-iit/chronolog-install/chronolog)
            # We need to copy it to /home/grc-iit/chronolog-install/chronolog for the grc-iit user
            # First, let's check where the installation actually is in the image
            echo '🔍 Searching for ChronoLog installation in image...'
            docker exec chronolog-c1 bash -c "
              echo 'Checking /home/grc-iit/chronolog-install/chronolog...'
              if [ -d /home/grc-iit/chronolog-install/chronolog ]; then
                echo '✅ Found at /home/grc-iit/chronolog-install/chronolog'
                ls -la /home/grc-iit/chronolog-install/chronolog/ | head -20
              fi
              echo 'Checking /root/chronolog-install/chronolog...'
              if [ -d /root/chronolog-install/chronolog ]; then
                echo '✅ Found at /root/chronolog-install/chronolog'
                ls -la /root/chronolog-install/chronolog/ | head -20
              fi
              echo 'Checking /home/runner/chronolog-install/chronolog...'
              if [ -d /home/runner/chronolog-install/chronolog ]; then
                echo '✅ Found at /home/runner/chronolog-install/chronolog'
                ls -la /home/runner/chronolog-install/chronolog/ | head -20
              fi
            " || true
            
            for i in $(seq 1 7); do
              docker exec chronolog-c$i bash -c "
                set -e
                # Create target directory
                mkdir -p /home/grc-iit/chronolog-install
                
                # Try multiple possible locations (in order of likelihood)
                if [ -d /home/grc-iit/chronolog-install/chronolog ] && [ -d /home/grc-iit/chronolog-install/chronolog/bin ]; then
                  echo '✅ ChronoLog already exists at /home/grc-iit/chronolog-install/chronolog'
                  chown -R grc-iit:grc-iit /home/grc-iit/chronolog-install
                elif [ -d /root/chronolog-install/chronolog ]; then
                  echo 'Copying from /root/chronolog-install/chronolog...'
                  cp -r /root/chronolog-install/chronolog /home/grc-iit/chronolog-install/
                  chown -R grc-iit:grc-iit /home/grc-iit/chronolog-install
                  echo '✅ Copied ChronoLog installation from /root'
                elif [ -d /home/runner/chronolog-install/chronolog ]; then
                  echo 'Copying from /home/runner/chronolog-install/chronolog...'
                    cp -r /home/runner/chronolog-install/chronolog /home/grc-iit/chronolog-install/
                    chown -R grc-iit:grc-iit /home/grc-iit/chronolog-install
                    echo '✅ Copied ChronoLog installation from /home/runner'
                  else
                    echo '❌ ChronoLog installation not found in image'
                  echo 'Searched in:'
                  echo '  - /home/grc-iit/chronolog-install/chronolog'
                  echo '  - /root/chronolog-install/chronolog'
                  echo '  - /home/runner/chronolog-install/chronolog'
                    exit 1
                fi
              "
            done
            
            # Verify the installation was copied correctly
            echo '🔍 Verifying copied installation...'
            docker exec chronolog-c1 bash -c "
              WORK_DIR=\"/home/grc-iit/chronolog-install/chronolog\"
              if [ -d \"\${WORK_DIR}\" ]; then
                echo '✅ Installation directory exists'
                echo 'Contents of installation directory:'
                ls -la \"\${WORK_DIR}\" | head -20
                if [ -d \"\${WORK_DIR}/bin\" ]; then
                  echo '✅ bin directory exists'
                  echo 'Contents of bin directory:'
                  ls -la \"\${WORK_DIR}/bin\" | head -20
                else
                  echo '❌ bin directory not found'
                fi
              else
                echo '❌ Installation directory not found'
              fi
            "
            echo '✅ ChronoLog installation ready (copied from image)'
          else
            echo '[1/5] Building and installing ChronoLog (using base image)...'
            # Build and install ChronoLog since we're using the base image
            # Make Spack database location writable
            docker exec chronolog-c1 bash -c "
              set -e
              # Create writable overlay for Spack database
              DB_DIR=/home/grc-iit/spack/opt/spack/.spack-db
              if [ -d \${DB_DIR} ]; then
                # Try to make it writable
                chmod -R u+w \${DB_DIR} 2>/dev/null || {
                  # If that fails, create a writable copy and use bind mount workaround
                  echo 'Creating writable database overlay...'
                  mkdir -p /tmp/spack-db-overlay
                  if [ -f \${DB_DIR}/lock ]; then
                    rm -f /tmp/spack-db-overlay/lock 2>/dev/null || true
                  fi
                  # Create a symlink or copy approach won't work, so we'll try a different method
                  # Make parent directories writable if possible
                  chmod u+w /home/grc-iit/spack/opt/spack 2>/dev/null || true
                  chmod u+w \${DB_DIR} 2>/dev/null || true
                }
              else
                # Database doesn't exist, create it
                mkdir -p \${DB_DIR}
                chmod -R u+w \${DB_DIR}
              fi
              echo '✅ Spack database location prepared'
            " || echo '⚠️ Could not make database writable, will proceed anyway'
            
            # Install Spack dependencies as root (which should have write permissions)
            docker exec chronolog-c1 bash -c "
              set -e
              cd /home/grc-iit/chronolog-repo
              source /home/grc-iit/spack/share/spack/setup-env.sh
              spack env activate -p .
              echo 'Installing/verifying Spack dependencies (as root)...'
              # Root should be able to write to /opt/spack if it's not truly read-only
              spack install || {
                echo '⚠️ spack install failed, but dependencies may already be installed'
                echo 'Continuing with build...'
              }
              echo '✅ Spack dependencies ready'
            " || echo '⚠️ Spack dependency installation had issues, continuing...'
            
            # Make .spack-env directory writable
            docker exec chronolog-c1 bash -c "
              set -e
              REPO_DIR=/home/grc-iit/chronolog-repo
              SPACK_ENV_DIR=\${REPO_DIR}/.spack-env
              if [ -d \${SPACK_ENV_DIR} ]; then
                chmod -R u+w \${SPACK_ENV_DIR} 2>/dev/null || {
                  echo '⚠️ Could not make .spack-env writable, will try to patch scripts'
                }
                # Remove transaction lock if it exists and is read-only
                if [ -f \${SPACK_ENV_DIR}/transaction_lock ]; then
                  chmod u+w \${SPACK_ENV_DIR}/transaction_lock 2>/dev/null || rm -f \${SPACK_ENV_DIR}/transaction_lock 2>/dev/null || true
                fi
                echo '✅ Spack environment directory prepared'
              else
                echo '⚠️ .spack-env directory not found, will be created by Spack'
              fi
            " || echo '⚠️ Could not prepare .spack-env directory, will proceed anyway'
            
            # Patch both build.sh and install.sh to handle read-only locks
            docker exec chronolog-c1 bash -c "
              set -e
              REPO_DIR=/home/grc-iit/chronolog-repo
              
              # Patch install.sh
              INSTALL_SCRIPT=\${REPO_DIR}/tools/deploy/ChronoLog/install.sh
              if [ -f \${INSTALL_SCRIPT} ]; then
                cp \${INSTALL_SCRIPT} \${INSTALL_SCRIPT}.bak
                awk '
                  BEGIN { skip_until_fi = 0 }
                  /if ! spack concretize/ {
                    print \"    # Check if .spack-env directory is writable before concretizing\"
                    print \"    if [ -w .spack-env ] 2>/dev/null || [ ! -d .spack-env ]; then\"
                    print \"        # Remove transaction lock if it exists and is read-only\"
                    print \"        if [ -f .spack-env/transaction_lock ] && [ ! -w .spack-env/transaction_lock ] 2>/dev/null; then\"
                    print \"            rm -f .spack-env/transaction_lock 2>/dev/null || true\"
                    print \"        fi\"
                    print \"        if ! spack concretize; then\"
                    print \"            echo -e \\\"\\\${DEBUG}Spack concretization failed. Exiting.\\\${NC}\\\"\"
                    print \"            exit 1\"
                    print \"        fi\"
                    print \"    else\"
                    print \"        echo -e \\\"\\\${DEBUG}Spack environment directory is read-only, skipping concretize (environment should already be concretized)\\\${NC}\\\"\"
                    print \"    fi\"
                    skip_until_fi = 1
                    next
                  }
                  skip_until_fi == 1 && /^[[:space:]]*fi[[:space:]]*$/ {
                    skip_until_fi = 0
                    next
                  }
                  skip_until_fi == 1 {
                    next
                  }
                  /^[[:space:]]*spack install -v[[:space:]]*$/ {
                    print \"    if [ -w /home/grc-iit/spack/opt/spack/.spack-db ] 2>/dev/null; then\"
                    print \"        spack install -v\"
                    print \"    else\"
                    print \"        echo -e \\\"\\\${DEBUG}Spack database is read-only, skipping install (dependencies should already be installed)\\\${NC}\\\"\"
                    print \"    fi\"
                    next
                  }
                  { print }
                ' \${INSTALL_SCRIPT}.bak > \${INSTALL_SCRIPT}
                chmod +x \${INSTALL_SCRIPT}
                echo '✅ Patched install.sh'
              fi
              
              # Patch build.sh
              BUILD_SCRIPT=\${REPO_DIR}/tools/deploy/ChronoLog/build.sh
              if [ -f \${BUILD_SCRIPT} ]; then
                cp \${BUILD_SCRIPT} \${BUILD_SCRIPT}.bak
                awk '
                  BEGIN { skip_until_fi = 0 }
                  /if ! spack concretize/ {
                    print \"    # Check if .spack-env directory is writable before concretizing\"
                    print \"    if [ -w .spack-env ] 2>/dev/null || [ ! -d .spack-env ]; then\"
                    print \"        # Remove transaction lock if it exists and is read-only\"
                    print \"        if [ -f .spack-env/transaction_lock ] && [ ! -w .spack-env/transaction_lock ] 2>/dev/null; then\"
                    print \"            rm -f .spack-env/transaction_lock 2>/dev/null || true\"
                    print \"        fi\"
                    print \"        if ! spack concretize; then\"
                    print \"            echo -e \\\"\\\${DEBUG}Spack concretization failed. Exiting.\\\${NC}\\\"\"
                    print \"            exit 1\"
                    print \"        fi\"
                    print \"    else\"
                    print \"        echo -e \\\"\\\${DEBUG}Spack environment directory is read-only, skipping concretize (environment should already be concretized)\\\${NC}\\\"\"
                    print \"    fi\"
                    skip_until_fi = 1
                    next
                  }
                  skip_until_fi == 1 && /^[[:space:]]*fi[[:space:]]*$/ {
                    skip_until_fi = 0
                    next
                  }
                  skip_until_fi == 1 {
                    next
                  }
                  /^[[:space:]]*spack install -v[[:space:]]*$/ {
                    print \"    if [ -w /home/grc-iit/spack/opt/spack/.spack-db ] 2>/dev/null; then\"
                    print \"        spack install -v\"
                    print \"    else\"
                    print \"        echo -e \\\"\\\${DEBUG}Spack database is read-only, skipping install (dependencies should already be installed)\\\${NC}\\\"\"
                    print \"    fi\"
