name: ChronoLog CI (Modular)

on:
  pull_request:
    # Run on any open PR to any branch
  push:
    branches: 
      - develop
      - 499-refactor-build-install-workflow  # Temporary: for testing
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to checkout and run workflow on'
        required: false
        default: ''
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/chronolog-ci
  INSTALL_BASE: /home/runner/chronolog-install

jobs:
  prepare-docker-image:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.set-tag.outputs.tag }}
      image-name: ${{ steps.set-image-name.outputs.full-name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          ref: ${{ github.event.inputs.branch != '' && github.event.inputs.branch || (github.event_name == 'pull_request' && github.event.pull_request.head.ref || github.ref) }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set repository name (lowercase)
        id: repo-name
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "name=${REPO_LOWER}" >> $GITHUB_OUTPUT

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ghcr.io/${{ steps.repo-name.outputs.name }}/chronolog-ci
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=pr-${{ github.event.pull_request.number }},enable=${{ github.event_name == 'pull_request' && github.event.pull_request.number != '' }}

      - name: Set image tag for jobs
        id: set-tag
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            echo "tag=pr-${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            # For manual runs, use the selected branch or default to latest
            if [ "${{ github.ref }}" == "refs/heads/develop" ] || [ "${{ github.ref }}" == "refs/heads/main" ]; then
              echo "tag=latest" >> $GITHUB_OUTPUT
            else
              BRANCH_NAME=${GITHUB_REF#refs/heads/}
              echo "tag=${BRANCH_NAME}" >> $GITHUB_OUTPUT
            fi
          elif [ "${{ github.ref }}" == "refs/heads/develop" ] || [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "tag=latest" >> $GITHUB_OUTPUT
          else
            BRANCH_NAME=${GITHUB_REF#refs/heads/}
            echo "tag=${BRANCH_NAME}" >> $GITHUB_OUTPUT
          fi

      - name: Set full image name
        id: set-image-name
        run: |
          # Convert repository name to lowercase (Docker requirement)
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            TAG="pr-${{ github.event.pull_request.number }}"
          elif [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            # For manual runs, use the selected branch or default to latest
            if [ "${{ github.ref }}" == "refs/heads/develop" ] || [ "${{ github.ref }}" == "refs/heads/main" ]; then
              TAG="latest"
            else
              BRANCH_NAME=${GITHUB_REF#refs/heads/}
              TAG="${BRANCH_NAME}"
            fi
          elif [ "${{ github.ref }}" == "refs/heads/develop" ] || [ "${{ github.ref }}" == "refs/heads/main" ]; then
            TAG="latest"
          else
            BRANCH_NAME=${GITHUB_REF#refs/heads/}
            TAG="${BRANCH_NAME}"
          fi
          echo "full-name=ghcr.io/${REPO_LOWER}/chronolog-ci:${TAG}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .github/docker
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  spack-setup:
    runs-on: ubuntu-22.04
    needs: prepare-docker-image
    permissions:
      contents: read
      packages: write
    timeout-minutes: 90
    outputs:
      image-name: ${{ steps.set-spack-image-name.outputs.full-name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          ref: ${{ github.event.inputs.branch != '' && github.event.inputs.branch || (github.event_name == 'pull_request' && github.event.pull_request.head.ref || github.ref) }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull base Docker image
        run: |
          docker pull "${{ needs.prepare-docker-image.outputs.image-name }}"

      - name: Set Spack image name
        id: set-spack-image-name
        run: |
          # Convert repository name to lowercase (Docker requirement)
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            TAG="pr-${{ github.event.pull_request.number }}-spack"
          elif [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            if [ "${{ github.ref }}" == "refs/heads/develop" ] || [ "${{ github.ref }}" == "refs/heads/main" ]; then
              TAG="latest-spack"
            else
              BRANCH_NAME=${GITHUB_REF#refs/heads/}
              TAG="${BRANCH_NAME}-spack"
            fi
          elif [ "${{ github.ref }}" == "refs/heads/develop" ] || [ "${{ github.ref }}" == "refs/heads/main" ]; then
            TAG="latest-spack"
          else
            BRANCH_NAME=${GITHUB_REF#refs/heads/}
            TAG="${BRANCH_NAME}-spack"
          fi
          echo "full-name=ghcr.io/${REPO_LOWER}/chronolog-ci:${TAG}" >> $GITHUB_OUTPUT

      - name: Install Spack dependencies in container
        run: |
          set -e
          BASE_IMAGE="${{ needs.prepare-docker-image.outputs.image-name }}"
          SPACK_IMAGE="${{ steps.set-spack-image-name.outputs.full-name }}"
          
          # Run container with workspace mounted and install Spack dependencies
          # Use --cidfile to capture the container ID before it exits
          CONTAINER_ID=$(docker create --user root \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            "$BASE_IMAGE" \
            bash -c "
              set -e
              source /opt/spack/share/spack/setup-env.sh
              spack env activate -p .
              echo '[1/2] Installing Spack dependencies...'
              spack install
              echo '✅ Spack dependencies installed successfully'
              echo 'Spack environment status:'
              spack env status
            ")
          
          # Start the container and wait for it to complete
          docker start -a "$CONTAINER_ID"
          
          # Commit the stopped container to a new image with Spack dependencies
          docker commit "$CONTAINER_ID" "$SPACK_IMAGE"
          
          # Clean up
          docker rm "$CONTAINER_ID"
          
      - name: Push Spack image
        run: |
          docker push "${{ steps.set-spack-image-name.outputs.full-name }}"

  build:
    runs-on: ubuntu-22.04
    needs: [spack-setup, prepare-docker-image]
    timeout-minutes: 30
    container:
      image: ${{ needs.spack-setup.outputs.image-name }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      options: --user root

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          ref: ${{ github.event.inputs.branch != '' && github.event.inputs.branch || (github.event_name == 'pull_request' && github.event.pull_request.head.ref || github.ref) }}

      - name: Setup Spack environment
        shell: bash
        run: |
          set -e
          source /opt/spack/share/spack/setup-env.sh
          spack env activate -p .
          echo "✅ Spack environment activated (dependencies already installed)"

      - name: Build ChronoLog
        shell: bash
        run: |
          set -e
          source /opt/spack/share/spack/setup-env.sh
          spack env activate -p .
          
          echo "[2/2] Building ChronoLog..."
          if [ -x ./tools/deploy/ChronoLog/local_single_user_deploy.sh ]; then
            ./tools/deploy/ChronoLog/local_single_user_deploy.sh -b
          else
            echo "❌ Build script not found or not executable"
            exit 1
          fi
          echo "✅ ChronoLog build completed"

      - name: Create build artifact
        run: |
          # Package the build directory for the next job
          # The build script creates $HOME/chronolog-build/Release
          if [ -d "$HOME/chronolog-build" ]; then
            tar -czf build-artifact.tar.gz -C "$HOME" chronolog-build/
          else
            echo "❌ Build directory not found at $HOME/chronolog-build"
            exit 1
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: chronolog-build
          path: build-artifact.tar.gz
          retention-days: 1

  install:
    runs-on: ubuntu-22.04
    needs: [build, spack-setup, prepare-docker-image]
    timeout-minutes: 30
    container:
      image: ${{ needs.spack-setup.outputs.image-name }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      options: --user root

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          ref: ${{ github.event.inputs.branch != '' && github.event.inputs.branch || (github.event_name == 'pull_request' && github.event.pull_request.head.ref || github.ref) }}

      - name: Setup Spack environment
        shell: bash
        run: |
          set -e
          source /opt/spack/share/spack/setup-env.sh
          spack env activate -p .
          echo "✅ Spack environment activated (dependencies already installed)"

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: chronolog-build

      - name: Extract build artifact
        run: |
          # Extract to $HOME so the install script can find it at $HOME/chronolog-build
          tar -xzf build-artifact.tar.gz -C "$HOME"

      - name: Install ChronoLog
        shell: bash
        run: |
          set -e
          source /opt/spack/share/spack/setup-env.sh
          spack env activate -p .
          
          if [ -x ./tools/deploy/ChronoLog/local_single_user_deploy.sh ]; then
            ./tools/deploy/ChronoLog/local_single_user_deploy.sh -i
          else
            echo "❌ Install script not found or not executable"
            exit 1
          fi

      - name: Verify installation
        shell: bash
        run: |
          set -e
          source /opt/spack/share/spack/setup-env.sh
          spack env activate -p .
          
          echo "LD_LIBRARY_PATH is: $LD_LIBRARY_PATH"
          echo "PATH is: $PATH"

          if [ -d "${INSTALL_BASE}/chronolog/bin" ]; then
            echo "✅ bin directory is found!"
            ls -l "${INSTALL_BASE}/chronolog/bin"
          else
            echo "❌ Install failed — bin directory not found"
            exit 1
          fi

          main_binaries=(chronovisor_server chrono_keeper chrono_grapher chrono_player)
          missing=0
          declare -a missing_binaries

          for exe in "${main_binaries[@]}"; do
            ldd_log="/tmp/ldd_$exe.txt"
            if [ ! -x "${INSTALL_BASE}/chronolog/bin/$exe" ]; then
              echo "❌ $exe is missing or not executable in bin folder!"
              continue
            else
              echo "✅ $exe is present and executable."
            fi
            echo "---- Checking dependencies for $exe ----"
            ldd "${INSTALL_BASE}/chronolog/bin/$exe" > "$ldd_log"
            if grep "not found" "$ldd_log"; then
              echo "❌ $exe is missing one or more shared libraries!"
              echo "----- ldd output for $exe -----"
              cat "$ldd_log"
              missing=1
              missing_binaries+=("$exe")
            else
              echo "✅ $exe dependencies OK."
            fi
          done

          if [ "$missing" = 1 ]; then
            echo ""
            echo "========= SUMMARY OF ldd OUTPUTS FOR MAIN BINARIES ========="
            for exe in "${main_binaries[@]}"; do
              echo "----- ldd output for $exe -----"
              cat "/tmp/ldd_$exe.txt" || echo "(no log found)"
              echo ""
            done
            echo "============================================================"
            echo "❌ One or more required binaries failed verification."
            exit 1
          else
            echo "✅ Install successful! All required binaries present, executable, and dependencies resolved."
          fi

      - name: Create install artifact
        run: |
          # Package the install directory for the next job
          tar -czf install-artifact.tar.gz -C "${INSTALL_BASE}" chronolog/

      - name: Upload install artifact
        uses: actions/upload-artifact@v4
        with:
          name: chronolog-install
          path: install-artifact.tar.gz
          retention-days: 1

  deploy:
    runs-on: ubuntu-22.04
    needs: [install, spack-setup, prepare-docker-image]
    timeout-minutes: 30
    container:
      image: ${{ needs.spack-setup.outputs.image-name }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      options: --user root

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          ref: ${{ github.event.inputs.branch != '' && github.event.inputs.branch || (github.event_name == 'pull_request' && github.event.pull_request.head.ref || github.ref) }}

      - name: Setup Spack environment
        shell: bash
        run: |
          set -e
          source /opt/spack/share/spack/setup-env.sh
          spack env activate -p .
          echo "✅ Spack environment activated (dependencies already installed)"

      - name: Download install artifact
        uses: actions/download-artifact@v4
        with:
          name: chronolog-install

      - name: Extract install artifact
        run: |
          mkdir -p "${INSTALL_BASE}"
          tar -xzf install-artifact.tar.gz -C "${INSTALL_BASE}"
          ls -la "${INSTALL_BASE}/chronolog"

      - name: Deploy ChronoLog
        shell: bash
        run: |
          set -e
          source /opt/spack/share/spack/setup-env.sh
          spack env activate -p .
          
          if [ -x ./tools/deploy/ChronoLog/local_single_user_deploy.sh ]; then
            ./tools/deploy/ChronoLog/local_single_user_deploy.sh -d -k 5 -r 3 -w "${INSTALL_BASE}/chronolog"
          else
            echo "❌ Deploy script not found or not executable"
            exit 1
          fi

      - name: Verify deployment
        run: |
          echo "Waiting for services to start..."
          sleep 5
          
          echo "📦 Listing ChronoLog processes..."
          pgrep -la chrono > /tmp/chrono_processes.txt || true
          cat /tmp/chrono_processes.txt

          echo "🔍 Checking required components..."
          missing=0
          for proc in chronovisor_server chrono_grapher chrono_player chrono_keeper; do
            count=$(grep -c "$proc" /tmp/chrono_processes.txt || true)
            case $proc in
              chronovisor_server)
                expected=1
                ;;
              chrono_grapher|chrono_player)
                expected=3
                ;;
              chrono_keeper)
                expected=5
                ;;
            esac
            if [ "$count" -eq "$expected" ]; then
              echo "✅ Found $count $proc (expected $expected)"
            else
              echo "❌ Missing or wrong count: $proc (found $count, expected $expected)"
              missing=1
            fi
          done

          if [ "$missing" != "1" ]; then
            echo "✅ All ChronoLog components are running."
          else
            echo "❌ Deployment incomplete — some components are not running or wrong count."
            echo "==== Dumping monitor logs ===="
            if [ -d "${INSTALL_BASE}/chronolog/monitor" ]; then
              for log in "${INSTALL_BASE}/chronolog/monitor/"*; do
                echo "==== $log ===="
                cat "$log"
              done
            else
              echo "No monitor logs found!"
            fi
            exit 1
          fi
