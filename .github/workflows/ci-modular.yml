name: ChronoLog CI (Modular)

on:
  pull_request:
    # Run on any open PR to any branch
  push:
    branches: 
      - develop
      - 499-refactor-build-install-workflow  # Temporary: for testing
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to checkout and run workflow on'
        required: false
        default: ''
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/chronolog-ci
  INSTALL_BASE: /home/runner/chronolog-install

jobs:
  chronolog-base:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write
    timeout-minutes: 90
    outputs:
      image-name: ${{ steps.set-base-image-name.outputs.full-name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          ref: ${{ github.event.inputs.branch != '' && github.event.inputs.branch || (github.event_name == 'pull_request' && github.event.pull_request.head.ref || github.ref) }}
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set repository name (lowercase)
        id: repo-name
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "name=${REPO_LOWER}" >> $GITHUB_OUTPUT

      - name: Set base image name
        id: set-base-image-name
        run: |
          # Convert repository name to lowercase (Docker requirement)
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            BASE_TAG="pr-${{ github.event.pull_request.number }}"
          elif [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            if [ "${{ github.ref }}" == "refs/heads/develop" ] || [ "${{ github.ref }}" == "refs/heads/main" ]; then
              BASE_TAG="latest"
            else
              BRANCH_NAME=${GITHUB_REF#refs/heads/}
              BASE_TAG="${BRANCH_NAME}"
            fi
          elif [ "${{ github.ref }}" == "refs/heads/develop" ] || [ "${{ github.ref }}" == "refs/heads/main" ]; then
            BASE_TAG="latest"
          else
            BRANCH_NAME=${GITHUB_REF#refs/heads/}
            BASE_TAG="${BRANCH_NAME}"
          fi
          
          TAG="chronolog-base-${BASE_TAG}"
          echo "full-name=ghcr.io/${REPO_LOWER}/chronolog:${TAG}" >> $GITHUB_OUTPUT
          echo "Base image tag: ${TAG}"

      - name: Check if Spack files changed
        id: check-spack-changes
        run: |
          set -e
          BASE_IMAGE="${{ steps.set-base-image-name.outputs.full-name }}"
          
          # Check if spack.yaml files have changed
          CHANGED=""
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            # For PRs, check against the base branch
            BASE_REF="${{ github.event.pull_request.base.ref }}"
            # Fetch the base branch for comparison
            git fetch origin ${BASE_REF}:${BASE_REF} 2>/dev/null || true
            CHANGED=$(git diff --name-only ${BASE_REF}...HEAD 2>/dev/null | grep -E '^(spack\.yaml|Client/spack\.yaml)$' || true)
          else
            # For pushes, check the last commit (if available)
            if git rev-parse --verify HEAD~1 >/dev/null 2>&1; then
              CHANGED=$(git diff --name-only HEAD~1 HEAD | grep -E '^(spack\.yaml|Client/spack\.yaml)$' || true)
            else
              # First commit or no history, assume changed
              CHANGED="spack.yaml"
            fi
          fi
          
          if [ -n "$CHANGED" ]; then
            echo "spack-files-changed=true" >> $GITHUB_OUTPUT
            echo "✅ Spack files changed, will rebuild image"
            echo "Changed files: $CHANGED"
          else
            echo "spack-files-changed=false" >> $GITHUB_OUTPUT
            echo "ℹ️ Spack files unchanged, checking if image exists..."
            
            # Try to pull the existing image
            if docker pull "$BASE_IMAGE" 2>/dev/null; then
              echo "image-exists=true" >> $GITHUB_OUTPUT
              echo "✅ Existing base image found, will skip rebuild"
            else
              echo "image-exists=false" >> $GITHUB_OUTPUT
              echo "⚠️ Existing base image not found, will rebuild"
            fi
          fi

      - name: Build base Docker image
        if: steps.check-spack-changes.outputs.spack-files-changed == 'true' || steps.check-spack-changes.outputs.image-exists == 'false'
        uses: docker/build-push-action@v4
        with:
          context: .github/docker
          push: false
          tags: ${{ steps.set-base-image-name.outputs.full-name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true

      - name: Install Spack dependencies in container
        if: steps.check-spack-changes.outputs.spack-files-changed == 'true' || steps.check-spack-changes.outputs.image-exists == 'false'
        run: |
          set -e
          BASE_IMAGE="${{ steps.set-base-image-name.outputs.full-name }}"
          FINAL_IMAGE="${{ steps.set-base-image-name.outputs.full-name }}"
          
          # Run container with workspace mounted and install Spack dependencies
          CONTAINER_ID=$(docker create --user root \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            "$BASE_IMAGE" \
            bash -c "
              set -e
              source /opt/spack/share/spack/setup-env.sh
              spack env activate -p .
              echo 'Installing Spack dependencies...'
              spack install
              echo '✅ Spack dependencies installed successfully'
              echo 'Spack environment status:'
              spack env status
            ")
          
          # Start the container and wait for it to complete
          docker start -a "$CONTAINER_ID"
          
          # Commit the stopped container to a new image with Spack dependencies
          docker commit "$CONTAINER_ID" "$FINAL_IMAGE"
          
          # Clean up
          docker rm "$CONTAINER_ID"

      - name: Push base image
        if: steps.check-spack-changes.outputs.spack-files-changed == 'true' || steps.check-spack-changes.outputs.image-exists == 'false'
        run: |
          docker push "${{ steps.set-base-image-name.outputs.full-name }}"

  build-install-deploy:
    runs-on: ubuntu-22.04
    needs: chronolog-base
    permissions:
      contents: read
      packages: write
    timeout-minutes: 60
    outputs:
      image-name: ${{ steps.set-final-image-name.outputs.full-name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          ref: ${{ github.event.inputs.branch != '' && github.event.inputs.branch || (github.event_name == 'pull_request' && github.event.pull_request.head.ref || github.ref) }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull base Docker image
        run: |
          docker pull "${{ needs.chronolog-base.outputs.image-name }}"

      - name: Set final image name
        id: set-final-image-name
        run: |
          # Convert repository name to lowercase (Docker requirement)
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            BASE_TAG="pr-${{ github.event.pull_request.number }}"
          elif [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            if [ "${{ github.ref }}" == "refs/heads/develop" ] || [ "${{ github.ref }}" == "refs/heads/main" ]; then
              BASE_TAG="latest"
            else
              BRANCH_NAME=${GITHUB_REF#refs/heads/}
              BASE_TAG="${BRANCH_NAME}"
            fi
          elif [ "${{ github.ref }}" == "refs/heads/develop" ] || [ "${{ github.ref }}" == "refs/heads/main" ]; then
            BASE_TAG="latest"
          else
            BRANCH_NAME=${GITHUB_REF#refs/heads/}
            BASE_TAG="${BRANCH_NAME}"
          fi
          
          TAG="chronolog-${BASE_TAG}"
          echo "full-name=ghcr.io/${REPO_LOWER}/chronolog:${TAG}" >> $GITHUB_OUTPUT
          echo "Final image tag: ${TAG}"

      - name: Create container for build and deploy
        id: create-container
        run: |
          set -e
          BASE_IMAGE="${{ needs.chronolog-base.outputs.image-name }}"
          CONTAINER_ID=$(docker create --user root \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            "$BASE_IMAGE" \
            tail -f /dev/null)
          echo "container-id=${CONTAINER_ID}" >> $GITHUB_OUTPUT
          docker start "$CONTAINER_ID"
          echo "Container created and started: ${CONTAINER_ID}"

      - name: Setup Spack environment in container
        run: |
          set -e
          CONTAINER_ID="${{ steps.create-container.outputs.container-id }}"
          docker exec "$CONTAINER_ID" bash -c "
            source /opt/spack/share/spack/setup-env.sh
            spack env activate -p .
            echo '✅ Spack environment activated'
          "

      - name: Build ChronoLog
        run: |
          set -e
          CONTAINER_ID="${{ steps.create-container.outputs.container-id }}"
          docker exec "$CONTAINER_ID" bash -c "
            set -e
            source /opt/spack/share/spack/setup-env.sh
            spack env activate -p .
            echo '[1/7] Building ChronoLog...'
            if [ -x ./tools/deploy/ChronoLog/local_single_user_deploy.sh ]; then
              ./tools/deploy/ChronoLog/local_single_user_deploy.sh -b
            else
              echo '❌ Build script not found or not executable'
              exit 1
            fi
            echo '✅ ChronoLog build completed'
          "

      - name: Install ChronoLog
        run: |
          set -e
          CONTAINER_ID="${{ steps.create-container.outputs.container-id }}"
          docker exec "$CONTAINER_ID" bash -c "
            set -e
            source /opt/spack/share/spack/setup-env.sh
            spack env activate -p .
            echo '[2/7] Installing ChronoLog...'
            if [ -x ./tools/deploy/ChronoLog/local_single_user_deploy.sh ]; then
              ./tools/deploy/ChronoLog/local_single_user_deploy.sh -i
            else
              echo '❌ Install script not found or not executable'
              exit 1
            fi
            echo '✅ ChronoLog installation completed'
          "

      - name: Verify Installation
        run: |
          set -e
          CONTAINER_ID="${{ steps.create-container.outputs.container-id }}"
          docker exec "$CONTAINER_ID" bash -c "
            set -e
            source /opt/spack/share/spack/setup-env.sh
            spack env activate -p .
            WORK_DIR=\"\$HOME/chronolog-install/chronolog\"
            echo '[3/7] Verifying installation...'
            if [ -d \"\${WORK_DIR}/bin\" ]; then
              echo '✅ bin directory found'
              ls -l \"\${WORK_DIR}/bin\"
            else
              echo '❌ Install failed — bin directory not found'
              exit 1
            fi
            main_binaries=(chronovisor_server chrono_keeper chrono_grapher chrono_player)
            missing=0
            for exe in \"\${main_binaries[@]}\"; do
              if [ ! -x \"\${WORK_DIR}/bin/\$exe\" ]; then
                echo \"❌ \$exe is missing or not executable!\"
                missing=1
              else
                echo \"✅ \$exe is present and executable\"
              fi
            done
            if [ \"\$missing\" = 1 ]; then
              echo '❌ Installation verification failed'
              exit 1
            fi
            echo '✅ Installation verification passed'
          "

      - name: Deploy ChronoLog
        run: |
          set -e
          CONTAINER_ID="${{ steps.create-container.outputs.container-id }}"
          docker exec "$CONTAINER_ID" bash -c "
            set -e
            source /opt/spack/share/spack/setup-env.sh
            spack env activate -p .
            WORK_DIR=\"\$HOME/chronolog-install/chronolog\"
            echo '[4/7] Deploying ChronoLog...'
            if [ -x ./tools/deploy/ChronoLog/local_single_user_deploy.sh ]; then
              ./tools/deploy/ChronoLog/local_single_user_deploy.sh -d -k 5 -r 3 -w \"\${WORK_DIR}\"
            else
              echo '❌ Deploy script not found or not executable'
              exit 1
            fi
            echo '✅ ChronoLog deployment started'
          "

      - name: Verify Deployment
        run: |
          set -e
          CONTAINER_ID="${{ steps.create-container.outputs.container-id }}"
          docker exec "$CONTAINER_ID" bash -c "
            set -e
            source /opt/spack/share/spack/setup-env.sh
            spack env activate -p .
            WORK_DIR=\"\$HOME/chronolog-install/chronolog\"
            echo '[5/7] Verifying deployment...'
            echo 'Waiting for services to start...'
            sleep 5
            echo '📦 Listing ChronoLog processes...'
            pgrep -la chrono > /tmp/chrono_processes.txt || true
            cat /tmp/chrono_processes.txt
            echo '🔍 Checking required components...'
            missing=0
            for proc in chronovisor_server chrono_grapher chrono_player chrono_keeper; do
              count=\$(grep -c \"\$proc\" /tmp/chrono_processes.txt || true)
              case \$proc in
                chronovisor_server)
                  expected=1
                  ;;
                chrono_grapher|chrono_player)
                  expected=3
                  ;;
                chrono_keeper)
                  expected=5
                  ;;
              esac
              if [ \"\$count\" -eq \"\$expected\" ]; then
                echo \"✅ Found \$count \$proc (expected \$expected)\"
              else
                echo \"❌ Missing or wrong count: \$proc (found \$count, expected \$expected)\"
                missing=1
              fi
            done
            if [ \"\$missing\" != \"0\" ]; then
              echo '❌ Deployment verification failed'
              echo '==== Dumping monitor logs ===='
              if [ -d \"\${WORK_DIR}/monitor\" ]; then
                for log in \"\${WORK_DIR}/monitor/\"*; do
                  echo \"==== \$log ====\"
                  cat \"\$log\"
                done
              fi
              exit 1
            fi
            echo '✅ Deployment verification passed'
          "

      - name: Stop ChronoLog
        run: |
          set -e
          CONTAINER_ID="${{ steps.create-container.outputs.container-id }}"
          docker exec "$CONTAINER_ID" bash -c "
            set -e
            source /opt/spack/share/spack/setup-env.sh
            spack env activate -p .
            echo '[6/7] Stopping ChronoLog...'
            if [ -x ./tools/deploy/ChronoLog/local_single_user_deploy.sh ]; then
              ./tools/deploy/ChronoLog/local_single_user_deploy.sh -s
            else
              echo '❌ Stop script not found or not executable'
              exit 1
            fi
            echo '✅ ChronoLog stop command completed'
          "

      - name: Verify all processes stopped
        run: |
          set -e
          CONTAINER_ID="${{ steps.create-container.outputs.container-id }}"
          docker exec "$CONTAINER_ID" bash -c "
            set -e
            echo '[6.5/7] Verifying all ChronoLog processes are stopped...'
            
            # Wait a moment for stop command to fully complete
            sleep 2
            
            # Check for specific ChronoLog processes and print results
            echo 'Checking for chronovisor_server processes...'
            VISOR_PIDS=\$(pgrep -f 'chronovisor_server' 2>/dev/null || true)
            if [ -n \"\$VISOR_PIDS\" ]; then
              echo \"❌ Found chronovisor_server processes: \$VISOR_PIDS\"
              pgrep -f 'chronovisor_server' -la || true
            else
              echo '✅ No chronovisor_server processes found'
            fi
            
            echo 'Checking for chrono_grapher processes...'
            GRAPHER_PIDS=\$(pgrep -f 'chrono_grapher' 2>/dev/null || true)
            if [ -n \"\$GRAPHER_PIDS\" ]; then
              echo \"❌ Found chrono_grapher processes: \$GRAPHER_PIDS\"
              pgrep -f 'chrono_grapher' -la || true
            else
              echo '✅ No chrono_grapher processes found'
            fi
            
            echo 'Checking for chrono_player processes...'
            PLAYER_PIDS=\$(pgrep -f 'chrono_player' 2>/dev/null || true)
            if [ -n \"\$PLAYER_PIDS\" ]; then
              echo \"❌ Found chrono_player processes: \$PLAYER_PIDS\"
              pgrep -f 'chrono_player' -la || true
            else
              echo '✅ No chrono_player processes found'
            fi
            
            echo 'Checking for chrono_keeper processes...'
            KEEPER_PIDS=\$(pgrep -f 'chrono_keeper' 2>/dev/null || true)
            if [ -n \"\$KEEPER_PIDS\" ]; then
              echo \"❌ Found chrono_keeper processes: \$KEEPER_PIDS\"
              pgrep -f 'chrono_keeper' -la || true
            else
              echo '✅ No chrono_keeper processes found'
            fi
            
            # Check if any processes are still running
            ALL_PIDS=\$(pgrep -f 'chronovisor_server|chrono_grapher|chrono_player|chrono_keeper' 2>/dev/null || true)
            if [ -n \"\$ALL_PIDS\" ]; then
              echo '❌ Some ChronoLog processes are still running'
              echo 'All remaining processes:'
              pgrep -f 'chronovisor_server|chrono_grapher|chrono_player|chrono_keeper' -la || true
              exit 1
            else
              echo '✅ All ChronoLog processes stopped successfully'
            fi
          "

      - name: Clean ChronoLog
        run: |
          set -e
          CONTAINER_ID="${{ steps.create-container.outputs.container-id }}"
          docker exec "$CONTAINER_ID" bash -c "
            set -e
            source /opt/spack/share/spack/setup-env.sh
            spack env activate -p .
            WORK_DIR=\"\$HOME/chronolog-install/chronolog\"
            echo '[7/7] Cleaning ChronoLog...'
            if [ -x ./tools/deploy/ChronoLog/local_single_user_deploy.sh ]; then
              ./tools/deploy/ChronoLog/local_single_user_deploy.sh -c -w \"\${WORK_DIR}\"
            else
              echo '❌ Clean script not found or not executable'
              exit 1
            fi
            echo '✅ ChronoLog cleaned'
          "

      - name: Commit and tag final image
        run: |
          set -e
          CONTAINER_ID="${{ steps.create-container.outputs.container-id }}"
          FINAL_IMAGE="${{ steps.set-final-image-name.outputs.full-name }}"
          docker stop "$CONTAINER_ID"
          docker commit "$CONTAINER_ID" "$FINAL_IMAGE"
          docker rm "$CONTAINER_ID"
          echo "✅ Final image committed: ${FINAL_IMAGE}"
          
      - name: Push final image
        run: |
          docker push "${{ steps.set-final-image-name.outputs.full-name }}"
