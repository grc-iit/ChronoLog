name: ChronoLog CI (Modular)

on:
  pull_request:
    # Run on any open PR to any branch
  push:
    branches: 
      - develop
      - 499-refactor-build-install-workflow  # Temporary: for testing
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to checkout and run workflow on'
        required: false
        default: ''
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/chronolog-ci
  INSTALL_BASE: /home/runner/chronolog-install

jobs:
  prepare-docker-image:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.set-tag.outputs.tag }}
      image-name: ${{ steps.set-image-name.outputs.full-name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          ref: ${{ github.event.inputs.branch != '' && github.event.inputs.branch || (github.event_name == 'pull_request' && github.event.pull_request.head.ref || github.ref) }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set repository name (lowercase)
        id: repo-name
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "name=${REPO_LOWER}" >> $GITHUB_OUTPUT

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ghcr.io/${{ steps.repo-name.outputs.name }}/chronolog
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=pr-${{ github.event.pull_request.number }},enable=${{ github.event_name == 'pull_request' && github.event.pull_request.number != '' }}

      - name: Set image tag for jobs
        id: set-tag
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            echo "tag=pr-${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            # For manual runs, use the selected branch or default to latest
            if [ "${{ github.ref }}" == "refs/heads/develop" ] || [ "${{ github.ref }}" == "refs/heads/main" ]; then
              echo "tag=latest" >> $GITHUB_OUTPUT
            else
              BRANCH_NAME=${GITHUB_REF#refs/heads/}
              echo "tag=${BRANCH_NAME}" >> $GITHUB_OUTPUT
            fi
          elif [ "${{ github.ref }}" == "refs/heads/develop" ] || [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "tag=latest" >> $GITHUB_OUTPUT
          else
            BRANCH_NAME=${GITHUB_REF#refs/heads/}
            echo "tag=${BRANCH_NAME}" >> $GITHUB_OUTPUT
          fi

      - name: Set full image name
        id: set-image-name
        run: |
          # Convert repository name to lowercase (Docker requirement)
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            BASE_TAG="pr-${{ github.event.pull_request.number }}"
          elif [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            if [ "${{ github.ref }}" == "refs/heads/develop" ] || [ "${{ github.ref }}" == "refs/heads/main" ]; then
              BASE_TAG="latest"
            else
              BRANCH_NAME=${GITHUB_REF#refs/heads/}
              BASE_TAG="${BRANCH_NAME}"
            fi
          elif [ "${{ github.ref }}" == "refs/heads/develop" ] || [ "${{ github.ref }}" == "refs/heads/main" ]; then
            BASE_TAG="latest"
          else
            BRANCH_NAME=${GITHUB_REF#refs/heads/}
            BASE_TAG="${BRANCH_NAME}"
          fi
          
          TAG="chronolog-base-${BASE_TAG}"
          echo "full-name=ghcr.io/${REPO_LOWER}/chronolog:${TAG}" >> $GITHUB_OUTPUT
          echo "Base image tag: ${TAG}"

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .github/docker
          push: true
          tags: |
            ${{ steps.meta.outputs.tags }}
            ${{ steps.set-image-name.outputs.full-name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  spack-setup:
    runs-on: ubuntu-22.04
    needs: prepare-docker-image
    permissions:
      contents: read
      packages: write
    timeout-minutes: 90
    outputs:
      image-name: ${{ steps.set-spack-image-name.outputs.full-name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          ref: ${{ github.event.inputs.branch != '' && github.event.inputs.branch || (github.event_name == 'pull_request' && github.event.pull_request.head.ref || github.ref) }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull base Docker image
        run: |
          docker pull "${{ needs.prepare-docker-image.outputs.image-name }}"

      - name: Set Spack image name
        id: set-spack-image-name
        run: |
          # Convert repository name to lowercase (Docker requirement)
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            BASE_TAG="pr-${{ github.event.pull_request.number }}"
          elif [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            if [ "${{ github.ref }}" == "refs/heads/develop" ] || [ "${{ github.ref }}" == "refs/heads/main" ]; then
              BASE_TAG="latest"
            else
              BRANCH_NAME=${GITHUB_REF#refs/heads/}
              BASE_TAG="${BRANCH_NAME}"
            fi
          elif [ "${{ github.ref }}" == "refs/heads/develop" ] || [ "${{ github.ref }}" == "refs/heads/main" ]; then
            BASE_TAG="latest"
          else
            BRANCH_NAME=${GITHUB_REF#refs/heads/}
            BASE_TAG="${BRANCH_NAME}"
          fi
          
          TAG="chronolog-spack-${BASE_TAG}"
          echo "full-name=ghcr.io/${REPO_LOWER}/chronolog:${TAG}" >> $GITHUB_OUTPUT
          echo "Spack image tag: ${TAG}"

      - name: Install Spack dependencies in container
        run: |
          set -e
          BASE_IMAGE="${{ needs.prepare-docker-image.outputs.image-name }}"
          SPACK_IMAGE="${{ steps.set-spack-image-name.outputs.full-name }}"
          
          # Run container with workspace mounted and install Spack dependencies
          # Use --cidfile to capture the container ID before it exits
          CONTAINER_ID=$(docker create --user root \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            "$BASE_IMAGE" \
            bash -c "
              set -e
              source /opt/spack/share/spack/setup-env.sh
              spack env activate -p .
              echo '[1/2] Installing Spack dependencies...'
              spack install
              echo '✅ Spack dependencies installed successfully'
              echo 'Spack environment status:'
              spack env status
            ")
          
          # Start the container and wait for it to complete
          docker start -a "$CONTAINER_ID"
          
          # Commit the stopped container to a new image with Spack dependencies
          docker commit "$CONTAINER_ID" "$SPACK_IMAGE"
          
          # Clean up
          docker rm "$CONTAINER_ID"
          
      - name: Push Spack image
        run: |
          docker push "${{ steps.set-spack-image-name.outputs.full-name }}"

  build-install-deploy:
    runs-on: ubuntu-22.04
    needs: [spack-setup, prepare-docker-image]
    permissions:
      contents: read
      packages: write
    timeout-minutes: 60
    outputs:
      image-name: ${{ steps.set-final-image-name.outputs.full-name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          ref: ${{ github.event.inputs.branch != '' && github.event.inputs.branch || (github.event_name == 'pull_request' && github.event.pull_request.head.ref || github.ref) }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull Spack Docker image
        run: |
          docker pull "${{ needs.spack-setup.outputs.image-name }}"

      - name: Set final image name
        id: set-final-image-name
        run: |
          # Convert repository name to lowercase (Docker requirement)
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            BASE_TAG="pr-${{ github.event.pull_request.number }}"
          elif [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            if [ "${{ github.ref }}" == "refs/heads/develop" ] || [ "${{ github.ref }}" == "refs/heads/main" ]; then
              BASE_TAG="latest"
            else
              BRANCH_NAME=${GITHUB_REF#refs/heads/}
              BASE_TAG="${BRANCH_NAME}"
            fi
          elif [ "${{ github.ref }}" == "refs/heads/develop" ] || [ "${{ github.ref }}" == "refs/heads/main" ]; then
            BASE_TAG="latest"
          else
            BRANCH_NAME=${GITHUB_REF#refs/heads/}
            BASE_TAG="${BRANCH_NAME}"
          fi
          
          TAG="chronolog-${BASE_TAG}"
          echo "full-name=ghcr.io/${REPO_LOWER}/chronolog:${TAG}" >> $GITHUB_OUTPUT
          echo "Final image tag: ${TAG}"

      - name: Create container for build and deploy
        id: create-container
        run: |
          set -e
          SPACK_IMAGE="${{ needs.spack-setup.outputs.image-name }}"
          CONTAINER_ID=$(docker create --user root \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            "$SPACK_IMAGE" \
            tail -f /dev/null)
          echo "container-id=${CONTAINER_ID}" >> $GITHUB_OUTPUT
          docker start "$CONTAINER_ID"
          echo "Container created and started: ${CONTAINER_ID}"

      - name: Setup Spack environment in container
        run: |
          set -e
          CONTAINER_ID="${{ steps.create-container.outputs.container-id }}"
          docker exec "$CONTAINER_ID" bash -c "
            source /opt/spack/share/spack/setup-env.sh
            spack env activate -p .
            echo '✅ Spack environment activated'
          "

      - name: Build ChronoLog
        run: |
          set -e
          CONTAINER_ID="${{ steps.create-container.outputs.container-id }}"
          docker exec "$CONTAINER_ID" bash -c "
            set -e
            source /opt/spack/share/spack/setup-env.sh
            spack env activate -p .
            echo '[1/7] Building ChronoLog...'
            if [ -x ./tools/deploy/ChronoLog/local_single_user_deploy.sh ]; then
              ./tools/deploy/ChronoLog/local_single_user_deploy.sh -b
            else
              echo '❌ Build script not found or not executable'
              exit 1
            fi
            echo '✅ ChronoLog build completed'
          "

      - name: Install ChronoLog
        run: |
          set -e
          CONTAINER_ID="${{ steps.create-container.outputs.container-id }}"
          docker exec "$CONTAINER_ID" bash -c "
            set -e
            source /opt/spack/share/spack/setup-env.sh
            spack env activate -p .
            echo '[2/7] Installing ChronoLog...'
            if [ -x ./tools/deploy/ChronoLog/local_single_user_deploy.sh ]; then
              ./tools/deploy/ChronoLog/local_single_user_deploy.sh -i
            else
              echo '❌ Install script not found or not executable'
              exit 1
            fi
            echo '✅ ChronoLog installation completed'
          "

      - name: Verify Installation
        run: |
          set -e
          CONTAINER_ID="${{ steps.create-container.outputs.container-id }}"
          docker exec "$CONTAINER_ID" bash -c "
            set -e
            source /opt/spack/share/spack/setup-env.sh
            spack env activate -p .
            WORK_DIR=\"\$HOME/chronolog-install/chronolog\"
            echo '[3/7] Verifying installation...'
            if [ -d \"\${WORK_DIR}/bin\" ]; then
              echo '✅ bin directory found'
              ls -l \"\${WORK_DIR}/bin\"
            else
              echo '❌ Install failed — bin directory not found'
              exit 1
            fi
            main_binaries=(chronovisor_server chrono_keeper chrono_grapher chrono_player)
            missing=0
            for exe in \"\${main_binaries[@]}\"; do
              if [ ! -x \"\${WORK_DIR}/bin/\$exe\" ]; then
                echo \"❌ \$exe is missing or not executable!\"
                missing=1
              else
                echo \"✅ \$exe is present and executable\"
              fi
            done
            if [ \"\$missing\" = 1 ]; then
              echo '❌ Installation verification failed'
              exit 1
            fi
            echo '✅ Installation verification passed'
          "

      - name: Deploy ChronoLog
        run: |
          set -e
          CONTAINER_ID="${{ steps.create-container.outputs.container-id }}"
          docker exec "$CONTAINER_ID" bash -c "
            set -e
            source /opt/spack/share/spack/setup-env.sh
            spack env activate -p .
            WORK_DIR=\"\$HOME/chronolog-install/chronolog\"
            echo '[4/7] Deploying ChronoLog...'
            if [ -x ./tools/deploy/ChronoLog/local_single_user_deploy.sh ]; then
              ./tools/deploy/ChronoLog/local_single_user_deploy.sh -d -k 5 -r 3 -w \"\${WORK_DIR}\"
            else
              echo '❌ Deploy script not found or not executable'
              exit 1
            fi
            echo '✅ ChronoLog deployment started'
          "

      - name: Verify Deployment
        run: |
          set -e
          CONTAINER_ID="${{ steps.create-container.outputs.container-id }}"
          docker exec "$CONTAINER_ID" bash -c "
            set -e
            source /opt/spack/share/spack/setup-env.sh
            spack env activate -p .
            WORK_DIR=\"\$HOME/chronolog-install/chronolog\"
            echo '[5/7] Verifying deployment...'
            echo 'Waiting for services to start...'
            sleep 5
            echo '📦 Listing ChronoLog processes...'
            pgrep -la chrono > /tmp/chrono_processes.txt || true
            cat /tmp/chrono_processes.txt
            echo '🔍 Checking required components...'
            missing=0
            for proc in chronovisor_server chrono_grapher chrono_player chrono_keeper; do
              count=\$(grep -c \"\$proc\" /tmp/chrono_processes.txt || true)
              case \$proc in
                chronovisor_server)
                  expected=1
                  ;;
                chrono_grapher|chrono_player)
                  expected=3
                  ;;
                chrono_keeper)
                  expected=5
                  ;;
              esac
              if [ \"\$count\" -eq \"\$expected\" ]; then
                echo \"✅ Found \$count \$proc (expected \$expected)\"
              else
                echo \"❌ Missing or wrong count: \$proc (found \$count, expected \$expected)\"
                missing=1
              fi
            done
            if [ \"\$missing\" != \"0\" ]; then
              echo '❌ Deployment verification failed'
              echo '==== Dumping monitor logs ===='
              if [ -d \"\${WORK_DIR}/monitor\" ]; then
                for log in \"\${WORK_DIR}/monitor/\"*; do
                  echo \"==== \$log ====\"
                  cat \"\$log\"
                done
              fi
              exit 1
            fi
            echo '✅ Deployment verification passed'
          "

      - name: Stop ChronoLog
        run: |
          set -e
          CONTAINER_ID="${{ steps.create-container.outputs.container-id }}"
          docker exec "$CONTAINER_ID" bash -c "
            set -e
            source /opt/spack/share/spack/setup-env.sh
            spack env activate -p .
            WORK_DIR=\"\$HOME/chronolog-install/chronolog\"
            echo '[6/7] Stopping ChronoLog...'
            if [ -x ./tools/deploy/ChronoLog/local_single_user_deploy.sh ]; then
              ./tools/deploy/ChronoLog/local_single_user_deploy.sh -s -w \"\${WORK_DIR}\"
            else
              echo '❌ Stop script not found or not executable'
              exit 1
            fi
            echo '✅ ChronoLog stop command completed'
          "

      - name: Verify all processes stopped
        run: |
          set -e
          CONTAINER_ID="${{ steps.create-container.outputs.container-id }}"
          docker exec "$CONTAINER_ID" bash -c "
            set -e
            echo 'Verifying all ChronoLog processes are stopped...'
            max_wait=30
            wait_interval=2
            elapsed=0
            while [ \$elapsed -lt \$max_wait ]; do
              running=\$(pgrep -c chrono || echo 0)
              if [ \"\$running\" = \"0\" ]; then
                echo '✅ All ChronoLog processes stopped'
                exit 0
              fi
              echo \"Waiting for processes to stop... (\$running still running, waited \$elapsed seconds)\"
              sleep \$wait_interval
              elapsed=\$((elapsed + wait_interval))
            done
            echo '⚠️ Some processes still running after wait period, force killing...'
            pkill -9 chrono || true
            sleep 2
            running=\$(pgrep -c chrono || echo 0)
            if [ \"\$running\" != \"0\" ]; then
              echo \"❌ Failed to stop all processes (\$running still running)\"
              pgrep -la chrono || true
              exit 1
            fi
            echo '✅ All ChronoLog processes stopped (force killed)'
          "

      - name: Clean ChronoLog
        run: |
          set -e
          CONTAINER_ID="${{ steps.create-container.outputs.container-id }}"
          docker exec "$CONTAINER_ID" bash -c "
            set -e
            source /opt/spack/share/spack/setup-env.sh
            spack env activate -p .
            WORK_DIR=\"\$HOME/chronolog-install/chronolog\"
            echo '[7/7] Cleaning ChronoLog...'
            if [ -x ./tools/deploy/ChronoLog/local_single_user_deploy.sh ]; then
              ./tools/deploy/ChronoLog/local_single_user_deploy.sh -c -w \"\${WORK_DIR}\"
            else
              echo '❌ Clean script not found or not executable'
              exit 1
            fi
            echo '✅ ChronoLog cleaned'
          "

      - name: Commit and tag final image
        run: |
          set -e
          CONTAINER_ID="${{ steps.create-container.outputs.container-id }}"
          FINAL_IMAGE="${{ steps.set-final-image-name.outputs.full-name }}"
          docker stop "$CONTAINER_ID"
          docker commit "$CONTAINER_ID" "$FINAL_IMAGE"
          docker rm "$CONTAINER_ID"
          echo "✅ Final image committed: ${FINAL_IMAGE}"
          
      - name: Push final image
        run: |
          docker push "${{ steps.set-final-image-name.outputs.full-name }}"
