name: "ChronoLog: Create Release"

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v2.5.0)'
        required: true

env:
  REGISTRY: ghcr.io
  RELEASE_INSTALL: /home/grc-iit/chronolog-install
  DEBUG_INSTALL: /home/grc-iit/chronolog-install

jobs:
  base-image:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    timeout-minutes: 90
    outputs:
      image-name: ${{ steps.set-base-image-name.outputs.full-name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute base image hash
        id: basehash
        run: |
          echo "hash=${{ hashFiles('spack.yaml', 'Client/spack.yaml', '.github/docker/**') }}" >> $GITHUB_OUTPUT

      - name: Set base image name
        id: set-base-image-name
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          HASH="${{ steps.basehash.outputs.hash }}"
          TAG="sha-${HASH}"
          echo "full-name=ghcr.io/${OWNER}/chronolog-base:${TAG}" >> $GITHUB_OUTPUT
          echo "Base image tag: ${TAG}"

      - name: Try to pull cached base image
        id: pull-base
        run: |
          set -e
          IMAGE="${{ steps.set-base-image-name.outputs.full-name }}"
          if docker pull "$IMAGE" 2>/dev/null; then
            echo "hit=true" >> $GITHUB_OUTPUT
            echo "Base image already exists: $IMAGE"
          else
            echo "hit=false" >> $GITHUB_OUTPUT
            echo "Base image not found, will build: $IMAGE"
          fi

      - name: Build base Docker image
        if: steps.pull-base.outputs.hit != 'true'
        uses: docker/build-push-action@v4
        with:
          context: .github/docker
          push: false
          tags: ${{ steps.set-base-image-name.outputs.full-name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true

      - name: Install Spack dependencies in container
        if: steps.pull-base.outputs.hit != 'true'
        run: |
          set -e
          BASE_IMAGE="${{ steps.set-base-image-name.outputs.full-name }}"
          FINAL_IMAGE="${{ steps.set-base-image-name.outputs.full-name }}"

          CONTAINER_ID=$(docker create --user root \
            -v "${{ github.workspace }}:/home/grc-iit/chronolog-repo" \
            -w /home/grc-iit/chronolog-repo \
            "$BASE_IMAGE" \
            bash -c "
              set -e
              chown -R grc-iit:grc-iit /home/grc-iit/chronolog-repo
              source /home/grc-iit/spack/share/spack/setup-env.sh
              spack env activate -p .
              echo 'Reconcretizing Spack environment for current architecture...'
              spack concretize --force
              echo 'Installing Spack dependencies...'
              spack install
              echo 'Spack dependencies installed successfully'
            ")

          docker start -a "$CONTAINER_ID"
          docker commit "$CONTAINER_ID" "$FINAL_IMAGE"
          docker rm "$CONTAINER_ID"

      - name: Push base image
        if: steps.pull-base.outputs.hit != 'true'
        run: |
          set -e
          echo "Pushing base image: ${{ steps.set-base-image-name.outputs.full-name }}"
          docker push "${{ steps.set-base-image-name.outputs.full-name }}"

  publish-docker-release-image:
    runs-on: ubuntu-24.04
    needs: base-image
    permissions:
      contents: read
      packages: write
    timeout-minutes: 120
    outputs:
      version: ${{ steps.extract-version.outputs.version }}
      image-name: ${{ steps.set-image-name.outputs.full-name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Extract version from tag
        id: extract-version
        run: |
          TAG="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Building packages for version: ${VERSION}"

      - name: Set image name
        id: set-image-name
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          VERSION="${{ steps.extract-version.outputs.version }}"
          echo "full-name=ghcr.io/${OWNER}/chronolog:v${VERSION}" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull base Docker image
        run: |
          docker pull "${{ needs.base-image.outputs.image-name }}"

      - name: Create and start container
        id: create-container
        run: |
          set -e
          BASE_IMAGE="${{ needs.base-image.outputs.image-name }}"
          CONTAINER_ID=$(docker create --user root --init \
            -v "${{ github.workspace }}:/tmp/chronolog-src" \
            -w /tmp/chronolog-src \
            "$BASE_IMAGE" \
            bash -c "chown -R grc-iit:grc-iit /tmp/chronolog-src && tail -f /dev/null")
          echo "container-id=${CONTAINER_ID}" >> $GITHUB_OUTPUT
          docker start "$CONTAINER_ID"

      - name: Reconcretize Spack environment
        run: |
          set -e
          CONTAINER_ID="${{ steps.create-container.outputs.container-id }}"
          docker exec "$CONTAINER_ID" bash -c "
            set -e
            source /home/grc-iit/spack/share/spack/setup-env.sh
            spack env activate -p .
            if [ ! -d \".spack-env/view\" ] || [ ! -d \".spack-env/view/bin\" ] || [ ! -d \".spack-env/view/lib\" ]; then
              spack concretize --force
            fi
          "

      - name: Build Release package
        run: |
          set -e
          CONTAINER_ID="${{ steps.create-container.outputs.container-id }}"
          docker exec "$CONTAINER_ID" bash -c "
            set -e
            source /home/grc-iit/spack/share/spack/setup-env.sh
            spack env activate -p .
            mkdir -p '${{ env.RELEASE_INSTALL }}'
            chown -R grc-iit:grc-iit '${{ env.RELEASE_INSTALL }}' || true
            ./tools/deploy/ChronoLog/build.sh -t Release -I '${{ env.RELEASE_INSTALL }}'
          "

      - name: Install Release package
        run: |
          set -e
          CONTAINER_ID="${{ steps.create-container.outputs.container-id }}"
          docker exec "$CONTAINER_ID" bash -c "
            set -e
            source /home/grc-iit/spack/share/spack/setup-env.sh
            spack env activate -p .
            ./tools/deploy/ChronoLog/install.sh -t Release -I '${{ env.RELEASE_INSTALL }}'
          "

      - name: Export install tree for RPM build
        run: |
          set -e
          CONTAINER_ID="${{ steps.create-container.outputs.container-id }}"
          mkdir -p /tmp/chronolog-install-tree
          docker exec "$CONTAINER_ID" bash -c \
            "tar czf - -C '${{ env.RELEASE_INSTALL }}' chronolog" \
            > /tmp/chronolog-install-tree/chronolog-install.tar.gz
          echo "Install tree exported: $(du -sh /tmp/chronolog-install-tree/chronolog-install.tar.gz)"

      - name: Create Release tarball
        run: |
          set -e
          CONTAINER_ID="${{ steps.create-container.outputs.container-id }}"
          docker exec "$CONTAINER_ID" bash -c "
            set -e
            source /home/grc-iit/spack/share/spack/setup-env.sh
            spack env activate -p .
            BUILD_DIR=\"\$HOME/chronolog-build/Release\"
            cmake --build \"\${BUILD_DIR}\" --target package_release
            echo 'Release packages created:'
            ls \"\${BUILD_DIR}/\"chronolog-*-linux-*.tar.gz \"\${BUILD_DIR}/\"chronolog_*-linux-*.deb 2>/dev/null || true
          "

      - name: Copy Release tarball out of container
        run: |
          set -e
          CONTAINER_ID="${{ steps.create-container.outputs.container-id }}"
          mkdir -p /tmp/chronolog-artifacts
          RELEASE_TAR=$(docker exec "$CONTAINER_ID" bash -c \
            "ls \$HOME/chronolog-build/Release/chronolog-*-linux-*.tar.gz 2>/dev/null | grep -v debug" || true)
          if [ -z "${RELEASE_TAR}" ]; then
            echo "ERROR: no release tarball found" >&2; exit 1
          fi
          if [ "$(echo "${RELEASE_TAR}" | wc -l)" -ne 1 ]; then
            echo "ERROR: expected exactly 1 release tarball; found: ${RELEASE_TAR}" >&2; exit 1
          fi
          echo "Release tarball: ${RELEASE_TAR}"
          docker exec "$CONTAINER_ID" bash -c "cat '${RELEASE_TAR}'" \
            > /tmp/chronolog-artifacts/$(basename "${RELEASE_TAR}")

      - name: Copy Release DEB out of container
        run: |
          set -e
          CONTAINER_ID="${{ steps.create-container.outputs.container-id }}"
          DEB_FILE=$(docker exec "$CONTAINER_ID" bash -c \
            "ls \$HOME/chronolog-build/Release/chronolog_*-linux-*.deb 2>/dev/null | grep -v debug" || true)
          if [ -n "$DEB_FILE" ]; then
            if [ "$(echo "${DEB_FILE}" | wc -l)" -ne 1 ]; then
              echo "ERROR: expected exactly 1 release DEB; found: ${DEB_FILE}" >&2; exit 1
            fi
            echo "Release DEB: ${DEB_FILE}"
            docker exec "$CONTAINER_ID" bash -c "cat '${DEB_FILE}'" \
              > /tmp/chronolog-artifacts/$(basename "${DEB_FILE}")
          else
            echo "No DEB package found — skipping"
          fi

      - name: Commit release Docker image
        run: |
          set -e
          CONTAINER_ID="${{ steps.create-container.outputs.container-id }}"
          VERSION="${{ steps.extract-version.outputs.version }}"
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')

          # Clean build artifacts and prepare image environment
          docker exec "$CONTAINER_ID" bash -c "
            set -e
            rm -rf /home/grc-iit/chronolog-build
            chown -R grc-iit:grc-iit '${{ env.RELEASE_INSTALL }}'
            echo 'export PATH=${{ env.RELEASE_INSTALL }}/chronolog/bin:\$PATH' >> /home/grc-iit/.bashrc
            echo 'export LD_LIBRARY_PATH=${{ env.RELEASE_INSTALL }}/chronolog/lib:\$LD_LIBRARY_PATH' >> /home/grc-iit/.bashrc
          "

          # Commit the running container as the release image
          docker commit \
            --change 'ENV PATH=${{ env.RELEASE_INSTALL }}/chronolog/bin:$PATH' \
            --change 'ENV LD_LIBRARY_PATH=${{ env.RELEASE_INSTALL }}/chronolog/lib' \
            --change 'ENV CHRONOLOG_HOME=${{ env.RELEASE_INSTALL }}/chronolog' \
            --change 'LABEL org.opencontainers.image.title=ChronoLog' \
            --change "LABEL org.opencontainers.image.version=${VERSION}" \
            --change 'LABEL org.opencontainers.image.source=https://github.com/grc-iit/ChronoLog' \
            --change 'USER grc-iit' \
            --change 'WORKDIR ${{ env.RELEASE_INSTALL }}/chronolog' \
            "$CONTAINER_ID" "ghcr.io/${OWNER}/chronolog:v${VERSION}"

          docker tag "ghcr.io/${OWNER}/chronolog:v${VERSION}" \
                     "ghcr.io/${OWNER}/chronolog:latest"

          echo "Release image committed: ghcr.io/${OWNER}/chronolog:v${VERSION}"

      - name: Push release Docker image
        run: |
          set -e
          VERSION="${{ steps.extract-version.outputs.version }}"
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          docker push "ghcr.io/${OWNER}/chronolog:v${VERSION}"
          docker push "ghcr.io/${OWNER}/chronolog:latest"
          echo "Release images pushed to GHCR"

      - name: Stop and remove container
        if: always()
        run: |
          CONTAINER_ID="${{ steps.create-container.outputs.container-id }}"
          docker stop "$CONTAINER_ID" || true
          docker rm "$CONTAINER_ID" || true

      - name: Upload Release packages as workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: chronolog-${{ steps.extract-version.outputs.version }}-release-packages
          path: /tmp/chronolog-artifacts/
          retention-days: 7

      - name: Upload install tree for RPM build
        uses: actions/upload-artifact@v4
        with:
          name: chronolog-${{ steps.extract-version.outputs.version }}-install-tree
          path: /tmp/chronolog-install-tree/chronolog-install.tar.gz
          # Short retention: only needed by build-rpm-release, which runs immediately after.
          retention-days: 1

  publish-docker-debug-image:
    runs-on: ubuntu-24.04
    needs: base-image
    permissions:
      contents: read
      packages: write
    timeout-minutes: 120
    outputs:
      version: ${{ steps.extract-version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Extract version from tag
        id: extract-version
        run: |
          TAG="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Building debug packages for version: ${VERSION}"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull base Docker image
        run: |
          docker pull "${{ needs.base-image.outputs.image-name }}"

      - name: Create and start container
        id: create-container
        run: |
          set -e
          BASE_IMAGE="${{ needs.base-image.outputs.image-name }}"
          CONTAINER_ID=$(docker create --user root --init \
            -v "${{ github.workspace }}:/tmp/chronolog-src" \
            -w /tmp/chronolog-src \
            "$BASE_IMAGE" \
            bash -c "chown -R grc-iit:grc-iit /tmp/chronolog-src && tail -f /dev/null")
          echo "container-id=${CONTAINER_ID}" >> $GITHUB_OUTPUT
          docker start "$CONTAINER_ID"

      - name: Reconcretize Spack environment
        run: |
          set -e
          CONTAINER_ID="${{ steps.create-container.outputs.container-id }}"
          docker exec "$CONTAINER_ID" bash -c "
            set -e
            source /home/grc-iit/spack/share/spack/setup-env.sh
            spack env activate -p .
            if [ ! -d \".spack-env/view\" ] || [ ! -d \".spack-env/view/bin\" ] || [ ! -d \".spack-env/view/lib\" ]; then
              spack concretize --force
            fi
          "

      - name: Build Debug package
        run: |
          set -e
          CONTAINER_ID="${{ steps.create-container.outputs.container-id }}"
          docker exec "$CONTAINER_ID" bash -c "
            set -e
            source /home/grc-iit/spack/share/spack/setup-env.sh
            spack env activate -p .
            mkdir -p '${{ env.DEBUG_INSTALL }}'
            chown -R grc-iit:grc-iit '${{ env.DEBUG_INSTALL }}' || true
            ./tools/deploy/ChronoLog/build.sh -t Debug -I '${{ env.DEBUG_INSTALL }}'
          "

      - name: Install Debug package
        run: |
          set -e
          CONTAINER_ID="${{ steps.create-container.outputs.container-id }}"
          docker exec "$CONTAINER_ID" bash -c "
            set -e
            source /home/grc-iit/spack/share/spack/setup-env.sh
            spack env activate -p .
            ./tools/deploy/ChronoLog/install.sh -t Debug -I '${{ env.DEBUG_INSTALL }}'
          "

      - name: Create Debug tarball
        run: |
          set -e
          CONTAINER_ID="${{ steps.create-container.outputs.container-id }}"
          docker exec "$CONTAINER_ID" bash -c "
            set -e
            source /home/grc-iit/spack/share/spack/setup-env.sh
            spack env activate -p .
            BUILD_DIR=\"\$HOME/chronolog-build/Debug\"
            cmake --build \"\${BUILD_DIR}\" --target package_release
            echo 'Debug packages created:'
            ls \"\${BUILD_DIR}/\"chronolog-*-linux-*-debug.tar.gz \"\${BUILD_DIR}/\"chronolog_*-linux-*-debug.deb 2>/dev/null || true
          "

      - name: Copy Debug tarball out of container
        run: |
          set -e
          CONTAINER_ID="${{ steps.create-container.outputs.container-id }}"
          mkdir -p /tmp/chronolog-artifacts
          DEBUG_TAR=$(docker exec "$CONTAINER_ID" bash -c \
            "ls \$HOME/chronolog-build/Debug/chronolog-*-linux-*-debug.tar.gz 2>/dev/null" || true)
          if [ -z "${DEBUG_TAR}" ]; then
            echo "ERROR: no debug tarball found" >&2; exit 1
          fi
          if [ "$(echo "${DEBUG_TAR}" | wc -l)" -ne 1 ]; then
            echo "ERROR: expected exactly 1 debug tarball; found: ${DEBUG_TAR}" >&2; exit 1
          fi
          echo "Debug tarball: ${DEBUG_TAR}"
          docker exec "$CONTAINER_ID" bash -c "cat '${DEBUG_TAR}'" \
            > /tmp/chronolog-artifacts/$(basename "${DEBUG_TAR}")

      - name: Copy Debug DEB out of container
        run: |
          set -e
          CONTAINER_ID="${{ steps.create-container.outputs.container-id }}"
          DEB_FILE=$(docker exec "$CONTAINER_ID" bash -c \
            "ls \$HOME/chronolog-build/Debug/chronolog_*-linux-*-debug.deb 2>/dev/null" || true)
          if [ -n "$DEB_FILE" ]; then
            if [ "$(echo "${DEB_FILE}" | wc -l)" -ne 1 ]; then
              echo "ERROR: expected exactly 1 debug DEB; found: ${DEB_FILE}" >&2; exit 1
            fi
            echo "Debug DEB: ${DEB_FILE}"
            docker exec "$CONTAINER_ID" bash -c "cat '${DEB_FILE}'" \
              > /tmp/chronolog-artifacts/$(basename "${DEB_FILE}")
          else
            echo "No debug DEB package found — skipping"
          fi

      - name: Export debug install tree for RPM build
        run: |
          set -e
          CONTAINER_ID="${{ steps.create-container.outputs.container-id }}"
          mkdir -p /tmp/chronolog-debug-install-tree
          docker exec "$CONTAINER_ID" bash -c \
            "tar czf - -C '${{ env.DEBUG_INSTALL }}' chronolog" \
            > /tmp/chronolog-debug-install-tree/chronolog-debug-install.tar.gz
          echo "Debug install tree exported: $(du -sh /tmp/chronolog-debug-install-tree/chronolog-debug-install.tar.gz)"

      - name: Commit debug Docker image
        run: |
          set -e
          CONTAINER_ID="${{ steps.create-container.outputs.container-id }}"
          VERSION="${{ steps.extract-version.outputs.version }}"
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')

          docker exec "$CONTAINER_ID" bash -c "
            set -e
            rm -rf /home/grc-iit/chronolog-build
            chown -R grc-iit:grc-iit '${{ env.DEBUG_INSTALL }}'
            echo 'export PATH=${{ env.DEBUG_INSTALL }}/chronolog/bin:\$PATH' >> /home/grc-iit/.bashrc
            echo 'export LD_LIBRARY_PATH=${{ env.DEBUG_INSTALL }}/chronolog/lib:\$LD_LIBRARY_PATH' >> /home/grc-iit/.bashrc
          "

          docker stop "$CONTAINER_ID"
          docker commit \
            --change 'ENV PATH=${{ env.DEBUG_INSTALL }}/chronolog/bin:$PATH' \
            --change 'ENV LD_LIBRARY_PATH=${{ env.DEBUG_INSTALL }}/chronolog/lib' \
            --change 'ENV CHRONOLOG_HOME=${{ env.DEBUG_INSTALL }}/chronolog' \
            --change 'LABEL org.opencontainers.image.title="ChronoLog Debug"' \
            --change "LABEL org.opencontainers.image.version=${VERSION}" \
            --change 'LABEL org.opencontainers.image.source=https://github.com/grc-iit/ChronoLog' \
            --change 'USER grc-iit' \
            --change 'WORKDIR ${{ env.DEBUG_INSTALL }}/chronolog' \
            "$CONTAINER_ID" "ghcr.io/${OWNER}/chronolog-debug:v${VERSION}"

          docker tag "ghcr.io/${OWNER}/chronolog-debug:v${VERSION}" \
                     "ghcr.io/${OWNER}/chronolog-debug:latest"

      - name: Push debug Docker image
        run: |
          set -e
          VERSION="${{ steps.extract-version.outputs.version }}"
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          docker push "ghcr.io/${OWNER}/chronolog-debug:v${VERSION}"
          docker push "ghcr.io/${OWNER}/chronolog-debug:latest"

      - name: Stop and remove container
        if: always()
        run: |
          CONTAINER_ID="${{ steps.create-container.outputs.container-id }}"
          docker stop "$CONTAINER_ID" || true
          docker rm "$CONTAINER_ID" || true

      - name: Upload Debug packages as workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: chronolog-${{ steps.extract-version.outputs.version }}-debug-packages
          path: /tmp/chronolog-artifacts/
          retention-days: 7

      - name: Upload debug install tree for RPM build
        uses: actions/upload-artifact@v4
        with:
          name: chronolog-${{ steps.extract-version.outputs.version }}-debug-install-tree
          path: /tmp/chronolog-debug-install-tree/chronolog-debug-install.tar.gz
          # Short retention: only needed by build-rpm-debug, which runs immediately after.
          retention-days: 1

  build-rpm-release:
    runs-on: ubuntu-24.04
    needs: publish-docker-release-image
    container:
      image: rockylinux:9
    permissions:
      contents: read
    timeout-minutes: 30
    outputs:
      version: ${{ needs.publish-docker-release-image.outputs.version }}

    steps:
      - name: Install build tools
        run: dnf install -y cmake rpm-build

      - name: Download install tree
        uses: actions/download-artifact@v4
        with:
          name: chronolog-${{ needs.publish-docker-release-image.outputs.version }}-install-tree
          path: /tmp/chronolog-install-tree

      - name: Extract install tree
        run: |
          mkdir -p /tmp/chronolog-install
          tar xzf /tmp/chronolog-install-tree/chronolog-install.tar.gz -C /tmp/chronolog-install
          echo "Install tree:"
          ls /tmp/chronolog-install/

      - name: Generate CPackRPMConfig.cmake
        run: |
          VERSION="${{ needs.publish-docker-release-image.outputs.version }}"
          if [ -z "${VERSION}" ]; then
            echo "ERROR: version not provided" >&2; exit 1
          fi
          BASE_VERSION="${VERSION%%-*}"
          if [ -z "${BASE_VERSION}" ]; then
            echo "ERROR: failed to extract base version from ${VERSION}" >&2; exit 1
          fi
          # Architecture is derived at runtime; the CMake template uses @CMAKE_SYSTEM_PROCESSOR@
          # which is not available here since CMake is not run in this Rocky container.
          ARCH="$(uname -m)"
          cat > /tmp/CPackRPMConfig.cmake << EOF
          set(CPACK_PACKAGE_NAME        "chronolog")
          set(CPACK_PACKAGE_VENDOR      "GRC-IIT, Illinois Institute of Technology")
          set(CPACK_PACKAGE_CONTACT     "egonzalez30@illinoistech.edu")
          set(CPACK_PACKAGE_VERSION     "${BASE_VERSION}")
          set(CPACK_PACKAGE_DESCRIPTION_SUMMARY "ChronoLog: Distributed Chronicle Logging System")
          # CPACK_PACKAGE_DESCRIPTION is required by CPack when running standalone (no CMake context).
          set(CPACK_PACKAGE_DESCRIPTION "ChronoLog: distributed, hierarchical, chronicle-based logging system for HPC clusters. Installed to /opt/chronolog (self-contained).")
          set(CPACK_GENERATOR "RPM")
          set(CPACK_INSTALL_CMAKE_PROJECTS "")
          set(CPACK_INCLUDE_TOPLEVEL_DIRECTORY OFF)
          # Path matches the extraction location in the "Extract install tree" step above.
          set(CPACK_INSTALLED_DIRECTORIES "/tmp/chronolog-install/chronolog" "opt/chronolog")
          set(CPACK_PACKAGE_FILE_NAME   "chronolog-${BASE_VERSION}-1.${ARCH}")
          set(CPACK_RPM_PACKAGE_RELEASE      "1")
          set(CPACK_RPM_PACKAGE_LICENSE      "BSD-2-Clause")
          set(CPACK_RPM_PACKAGE_GROUP        "System Environment/Daemons")
          set(CPACK_RPM_PACKAGE_ARCHITECTURE "${ARCH}")
          set(CPACK_RPM_PACKAGE_PREFIX       "/opt")
          set(CPACK_RPM_PACKAGE_REQUIRES     "json-c >= 0.13")
          set(CPACK_RPM_PACKAGE_DESCRIPTION
          "ChronoLog is a distributed, hierarchical, and tiered chronicle-based logging
          system designed for high-performance recording and playback of time-ordered
          event streams across HPC clusters.

          Installed to /opt/chronolog (self-contained: all non-system libraries bundled).

          Components: ChronoVisor, ChronoKeeper, ChronoGrapher, ChronoPlayer,
                      chronolog_client library, ChronoKVS plugin.")
          EOF

      - name: Build RPM
        run: |
          mkdir -p /tmp/rpm-output
          cpack --config /tmp/CPackRPMConfig.cmake -G RPM -B /tmp/rpm-output
          echo "RPM output:"
          ls /tmp/rpm-output/*.rpm

      - name: Rename RPM with platform suffix
        run: |
          VERSION="${{ needs.publish-docker-release-image.outputs.version }}"
          BASE_VERSION="${VERSION%%-*}"
          ARCH="$(uname -m)"
          mv /tmp/rpm-output/chronolog-${BASE_VERSION}-1.${ARCH}.rpm \
             /tmp/rpm-output/chronolog-${BASE_VERSION}-linux-${ARCH}.rpm
          echo "Final RPM: $(ls /tmp/rpm-output/)"

      - name: Upload RPM artifact
        uses: actions/upload-artifact@v4
        with:
          name: chronolog-${{ needs.publish-docker-release-image.outputs.version }}-rpm
          path: /tmp/rpm-output/*.rpm
          retention-days: 7

  build-rpm-debug:
    runs-on: ubuntu-24.04
    needs: publish-docker-debug-image
    container:
      image: rockylinux:9
    permissions:
      contents: read
    timeout-minutes: 30
    outputs:
      version: ${{ needs.publish-docker-debug-image.outputs.version }}

    steps:
      - name: Install build tools
        run: dnf install -y cmake rpm-build

      - name: Download debug install tree
        uses: actions/download-artifact@v4
        with:
          name: chronolog-${{ needs.publish-docker-debug-image.outputs.version }}-debug-install-tree
          path: /tmp/chronolog-debug-install-tree

      - name: Extract debug install tree
        run: |
          mkdir -p /tmp/chronolog-debug-install
          tar xzf /tmp/chronolog-debug-install-tree/chronolog-debug-install.tar.gz -C /tmp/chronolog-debug-install
          echo "Debug install tree:"
          ls /tmp/chronolog-debug-install/

      - name: Generate CPackRPMConfig.cmake for debug
        run: |
          VERSION="${{ needs.publish-docker-debug-image.outputs.version }}"
          if [ -z "${VERSION}" ]; then
            echo "ERROR: version not provided" >&2; exit 1
          fi
          BASE_VERSION="${VERSION%%-*}"
          if [ -z "${BASE_VERSION}" ]; then
            echo "ERROR: failed to extract base version from ${VERSION}" >&2; exit 1
          fi
          # Architecture is derived at runtime; the CMake template uses @CMAKE_SYSTEM_PROCESSOR@
          # which is not available here since CMake is not run in this Rocky container.
          ARCH="$(uname -m)"
          cat > /tmp/CPackRPMDebugConfig.cmake << EOF
          set(CPACK_PACKAGE_NAME        "chronolog")
          set(CPACK_PACKAGE_VENDOR      "GRC-IIT, Illinois Institute of Technology")
          set(CPACK_PACKAGE_CONTACT     "egonzalez30@illinoistech.edu")
          set(CPACK_PACKAGE_VERSION     "${BASE_VERSION}")
          set(CPACK_PACKAGE_DESCRIPTION_SUMMARY "ChronoLog: Distributed Chronicle Logging System (Debug)")
          # CPACK_PACKAGE_DESCRIPTION is required by CPack when running standalone (no CMake context).
          set(CPACK_PACKAGE_DESCRIPTION "ChronoLog: distributed, hierarchical, chronicle-based logging system for HPC clusters. Debug build. Installed to /opt/chronolog (self-contained).")
          set(CPACK_GENERATOR "RPM")
          set(CPACK_INSTALL_CMAKE_PROJECTS "")
          set(CPACK_INCLUDE_TOPLEVEL_DIRECTORY OFF)
          # Path matches the extraction location in the "Extract debug install tree" step above.
          set(CPACK_INSTALLED_DIRECTORIES "/tmp/chronolog-debug-install/chronolog" "opt/chronolog")
          set(CPACK_PACKAGE_FILE_NAME   "chronolog-${BASE_VERSION}-linux-${ARCH}-debug")
          set(CPACK_RPM_PACKAGE_RELEASE      "1")
          set(CPACK_RPM_PACKAGE_LICENSE      "BSD-2-Clause")
          set(CPACK_RPM_PACKAGE_GROUP        "System Environment/Daemons")
          set(CPACK_RPM_PACKAGE_ARCHITECTURE "${ARCH}")
          set(CPACK_RPM_PACKAGE_PREFIX       "/opt")
          set(CPACK_RPM_PACKAGE_REQUIRES     "json-c >= 0.13")
          set(CPACK_RPM_PACKAGE_DESCRIPTION
          "ChronoLog is a distributed, hierarchical, and tiered chronicle-based logging
          system designed for high-performance recording and playback of time-ordered
          event streams across HPC clusters. Debug build.

          Installed to /opt/chronolog (self-contained: all non-system libraries bundled).

          Components: ChronoVisor, ChronoKeeper, ChronoGrapher, ChronoPlayer,
                      chronolog_client library, ChronoKVS plugin.")
          EOF

      - name: Build debug RPM
        run: |
          mkdir -p /tmp/rpm-debug-output
          cpack --config /tmp/CPackRPMDebugConfig.cmake -G RPM -B /tmp/rpm-debug-output
          echo "Debug RPM output:"
          ls /tmp/rpm-debug-output/*.rpm

      - name: Upload debug RPM artifact
        uses: actions/upload-artifact@v4
        with:
          name: chronolog-${{ needs.publish-docker-debug-image.outputs.version }}-rpm-debug
          path: /tmp/rpm-debug-output/*.rpm
          retention-days: 7

  publish-release:
    runs-on: ubuntu-24.04
    needs: [publish-docker-release-image, publish-docker-debug-image, build-rpm-release, build-rpm-debug]
    permissions:
      contents: write
    timeout-minutes: 30

    steps:
      - name: Download Release packages
        uses: actions/download-artifact@v4
        with:
          name: chronolog-${{ needs.publish-docker-release-image.outputs.version }}-release-packages
          path: /tmp/chronolog-artifacts

      - name: Download Debug packages
        uses: actions/download-artifact@v4
        with:
          name: chronolog-${{ needs.publish-docker-debug-image.outputs.version }}-debug-packages
          path: /tmp/chronolog-artifacts

      - name: Download Release RPM package
        uses: actions/download-artifact@v4
        with:
          name: chronolog-${{ needs.publish-docker-release-image.outputs.version }}-rpm
          path: /tmp/chronolog-artifacts

      - name: Download Debug RPM package
        uses: actions/download-artifact@v4
        with:
          name: chronolog-${{ needs.publish-docker-debug-image.outputs.version }}-rpm-debug
          path: /tmp/chronolog-artifacts

      - name: List release artifacts
        run: ls -lh /tmp/chronolog-artifacts/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          name: ChronoLog ${{ needs.publish-docker-release-image.outputs.version }}
          generate_release_notes: true
          draft: false
          prerelease: false
          files: /tmp/chronolog-artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
