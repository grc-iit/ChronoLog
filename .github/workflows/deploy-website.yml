name: "ChronoLog: Deploy Website"

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - 'docs-website/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install main website dependencies
        run: npm ci
        working-directory: website

      - name: Build main website
        run: npm run build
        working-directory: website

      - name: Install docs website dependencies
        run: npm ci
        working-directory: docs-website

      - name: Build docs website
        run: npm run build
        working-directory: docs-website

      - name: Merge docs into main website build
        run: cp -r docs-website/build/. website/dist/docs/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
