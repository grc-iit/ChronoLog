[pytest]
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --strict-markers
    --tb=short
    --log-level=DEBUG
    --log-cli-level=DEBUG
    -W ignore::DeprecationWarning
    --forked
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests

# NOTE: Coverage collection with pytest-forked requires special handling.
# pytest-forked runs each test in a separate subprocess, so coverage data
# must be collected separately. Use run_tests_with_coverage.sh for coverage.



