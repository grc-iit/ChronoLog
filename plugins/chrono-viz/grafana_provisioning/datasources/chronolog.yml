# ChronoLog Data Source Provisioning
# This file automatically configures the ChronoLog data source in Grafana
# Backend URL port: set CHRONOLOG_BACKEND_SERVICE_PORT (default 8080) in the Grafana environment

apiVersion: 1

datasources:
  - name: ChronoLog
    type: chronolog-datasource
    access: proxy
    uid: chronolog
    orgId: 1
    version: 1
    isDefault: false
    jsonData:
      backendUrl: http://localhost:${CHRONOLOG_BACKEND_SERVICE_PORT}
      defaultChronicleName: CHRONICLE_NAME
      defaultStoryName: STORY_NAME
    editable: true

